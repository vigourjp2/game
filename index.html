<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>SPARK WIRE PUYO ONLINE</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#07101d;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;touch-action:none}
#wrap{width:100vw;height:100vh;display:grid;grid-template-rows:auto 1fr auto;gap:6px;padding:8px;background:radial-gradient(circle at top,#263653,#0b1020 55%,#04070e)}
header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
h1{margin:0;font-size:clamp(18px,4vw,28px);letter-spacing:.03em;text-shadow:0 0 12px #6bd7ff}
#sub{font-size:12px;line-height:1.35;text-align:right;opacity:.85;font-weight:800}
#stageWrap{position:relative;border:2px solid rgba(127,197,255,.5);border-radius:18px;background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02));box-shadow:inset 0 0 28px rgba(255,255,255,.04),0 0 18px rgba(0,180,255,.14);overflow:hidden}
canvas{display:block;width:100%;height:100%;touch-action:none}
#controls{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
button{border:0;border-radius:14px;padding:11px 4px;background:linear-gradient(180deg,#1f9cf0,#0869b1);color:#fff;font-weight:1000;font-size:15px;box-shadow:inset 0 1px rgba(255,255,255,.28),0 4px 10px rgba(0,0,0,.35);touch-action:manipulation}
button:active{transform:translateY(2px);filter:brightness(1.15)}
#panel{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(2,8,18,.72);z-index:10;padding:14px}
#card{width:min(620px,94vw);border:2px solid rgba(127,197,255,.45);border-radius:18px;background:linear-gradient(180deg,#13233b,#06101f);padding:18px;box-shadow:0 10px 28px rgba(0,0,0,.45)}
#card h2{margin:0 0 10px;font-size:clamp(24px,7vw,38px)}
#card p{margin:0 0 12px;color:#cbd5e1;font-weight:700}
input{width:100%;margin:7px 0;padding:14px 16px;border-radius:14px;border:2px solid rgba(255,255,255,.17);background:#050d1b;color:#fff;font-size:20px;font-weight:900;outline:none}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
#soloBtn{width:100%;margin-top:10px;background:linear-gradient(180deg,#64748b,#334155)}
#status{margin-top:12px;min-height:38px;color:#dbeafe;font-size:13px;line-height:1.35;font-weight:700}
.badge{position:absolute;left:10px;top:10px;z-index:5;background:rgba(2,8,18,.65);border:1px solid rgba(255,255,255,.18);border-radius:14px;padding:8px 12px;font-weight:1000;color:#eaf6ff}
#toast{position:absolute;left:50%;top:52%;transform:translate(-50%,-50%);pointer-events:none;z-index:6;font-weight:1000;font-size:clamp(26px,8vw,64px);text-align:center;white-space:pre-line;text-shadow:0 0 16px #00e5ff,0 0 28px #ffeb5c,0 5px 0 rgba(0,0,0,.4);opacity:0;transition:.2s}
</style>
</head>
<body>
<div id="wrap">
  <header>
    <h1>SPARK WIRE PUYO</h1>
    <div id="sub">1ブロック電線対戦<br>4連結でスパーク、輪で大炎上</div>
  </header>
  <div id="stageWrap">
    <div class="badge" id="modeBadge">MENU</div>
    <canvas id="game"></canvas>
    <div id="toast"></div>
    <div id="panel">
      <div id="card">
        <h2>SPARK WIRE ONLINE</h2>
        <p>HOSTが左、JOINが右。Room IDを同じにして対戦。</p>
        <input id="nameInput" value="P" maxlength="16" placeholder="NAME">
        <input id="roomInput" value="1" maxlength="18" placeholder="ROOM ID">
        <div class="row">
          <button id="hostBtn">HOSTで開始</button>
          <button id="joinBtn">JOINで開始</button>
        </div>
        <button id="soloBtn">ソロで開始</button>
        <div id="status">GitHub Pages等の https 上で使用。</div>
      </div>
    </div>
  </div>
  <div id="controls">
    <button data-k="ArrowLeft">←</button>
    <button data-k="ArrowRight">→</button>
    <button data-k="ArrowDown">↓</button>
    <button data-k="ArrowUp">回転</button>
    <button data-k="Space">落下</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-database-compat.js"></script>
<script>
(function(){
"use strict";

const firebaseConfig={
  apiKey:"AIzaSyD-rY3jJ2ITZTqfCsk21vu3d22nR5_0p9o",
  authDomain:"spark-wire-puyo.firebaseapp.com",
  databaseURL:"https://spark-wire-puyo-default-rtdb.firebaseio.com",
  projectId:"spark-wire-puyo",
  storageBucket:"spark-wire-puyo.firebasestorage.app",
  messagingSenderId:"486809623043",
  appId:"1:486809623043:web:8feff1ab8972119d1e2c39"
};

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const panel=document.getElementById("panel");
const statusEl=document.getElementById("status");
const badge=document.getElementById("modeBadge");
const toast=document.getElementById("toast");
const nameInput=document.getElementById("nameInput");
const roomInput=document.getElementById("roomInput");

const COLS=6, ROWS=12;
const DIRS=[
  {x:0,y:-1,bit:1,opp:4},
  {x:1,y:0,bit:2,opp:8},
  {x:0,y:1,bit:4,opp:1},
  {x:-1,y:0,bit:8,opp:2}
];
const TYPES=[
  {mask:1|4,color:"#66d9ff"},
  {mask:1|2,color:"#7cff8c"},
  {mask:2|4,color:"#9aa7ff"},
  {mask:1|2|8,color:"#ffd75d"},
  {mask:1|2|4|8,color:"#ff70e8"},
  {mask:1,color:"#ff8b68"}
];
const SPARK_COLORS=["#4df6ff","#ffe75f","#ff6cf1","#81ff5d","#ff5d5d"];

let W=360,H=520,cell=28,gap=8,leftX=20,rightX=200,boardTop=70;
let running=false,last=performance.now();
let db=null,roomRef=null,mode="menu",localSide="solo",lastNet=0;
const keys=new Set();
const remoteKeys=new Set();

function rnd(n){return Math.floor(Math.random()*n)}
function msg(t){toast.textContent=t;toast.style.opacity="1";clearTimeout(msg.t);msg.t=setTimeout(()=>toast.style.opacity="0",650)}
function setStatus(t){statusEl.textContent=t}
function safeRoom(v){return String(v||"1").replace(/[^a-zA-Z0-9_-]/g,"").slice(0,18)||"1"}

function rotateMask(mask){
  let o=0;
  if(mask&1)o|=2;
  if(mask&2)o|=4;
  if(mask&4)o|=8;
  if(mask&8)o|=1;
  return o;
}
function makeBlock(){
  const t=TYPES[rnd(TYPES.length)];
  let mask=t.mask;
  for(let i=0;i<rnd(4);i++)mask=rotateMask(mask);
  return {mask,color:t.color,charred:false,burn:0,shock:0};
}
function cloneBlock(b){return b?{mask:b.mask,color:b.color,charred:!!b.charred,burn:b.burn||0,shock:b.shock||0}:null}

function makePlayer(side){
  return {
    side,name:side==="L"?"HOST":"JOIN",
    grid:Array.from({length:ROWS},()=>Array(COLS).fill(null)),
    active:null,next:makeBlock(),score:0,combo:0,pendingLightning:0,
    fallTimer:0,aiTimer:0,gameOver:false,flash:0,input:null,
    spark:{x:rnd(COLS),y:ROWS-1,fromX:0,fromY:ROWS-1,renderX:0,renderY:ROWS-1,dir:rnd(4),t:0,speed:2.8,chain:0,colorIndex:0,trail:[]}
  };
}
const P1=makePlayer("L");
const P2=makePlayer("R");

function occupied(p,x,y){return x<0||x>=COLS||y<0||y>=ROWS||!!p.grid[y][x]}
function spawn(p){
  p.active={x:Math.floor(COLS/2),y:0,block:cloneBlock(p.next)};
  p.next=makeBlock();
  if(occupied(p,p.active.x,p.active.y)){p.gameOver=true;running=false;msg(p.side==="L"?"HOST LOSE":"JOIN LOSE")}
}
function canMove(p,dx,dy){
  if(!p.active)return false;
  const x=p.active.x+dx,y=p.active.y+dy;
  return x>=0&&x<COLS&&y>=0&&y<ROWS&&!p.grid[y][x];
}
function lockBlock(p){
  if(!p.active)return;
  p.grid[p.active.y][p.active.x]=cloneBlock(p.active.block);
  p.active=null;
  applyPendingLightning(p);
  spawn(p);
}
function hardDrop(p){if(!p.active)return;while(canMove(p,0,1))p.active.y++;lockBlock(p)}
function rotateActive(p){if(p.active)p.active.block.mask=rotateMask(p.active.block.mask)}
function gravity(p){
  for(let x=0;x<COLS;x++){
    let w=ROWS-1;
    for(let y=ROWS-1;y>=0;y--){
      if(p.grid[y][x]){
        if(w!==y){p.grid[w][x]=p.grid[y][x];p.grid[y][x]=null}
        w--;
      }
    }
  }
}
function applyPendingLightning(p){
  while(p.pendingLightning>0){
    const a=[];
    for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++)if(p.grid[y][x])a.push({x,y});
    if(!a.length)break;
    const h=a[rnd(a.length)],b=p.grid[h.y][h.x];
    b.charred=true;b.mask=0;b.color="#2b2b2b";b.shock=36;
    p.pendingLightning--;
  }
}

function connectedNeighbors(p,x,y){
  const b=p.grid[y]?.[x],out=[];
  if(!b||b.charred)return out;
  for(let i=0;i<DIRS.length;i++){
    const d=DIRS[i];
    if(!(b.mask&d.bit))continue;
    const nx=x+d.x,ny=y+d.y,nb=p.grid[ny]?.[nx];
    if(nb&&!nb.charred&&(nb.mask&d.opp))out.push({x:nx,y:ny,dir:i});
  }
  return out;
}
function findComponent(p,sx,sy){
  const st=p.grid[sy]?.[sx];
  if(!st||st.charred)return {cells:[],edges:0,loop:false};
  const seen=new Set(),stack=[{x:sx,y:sy}];let edges=0;
  while(stack.length){
    const c=stack.pop(),k=c.x+","+c.y;
    if(seen.has(k))continue;
    seen.add(k);
    const ns=connectedNeighbors(p,c.x,c.y); edges+=ns.length;
    for(const n of ns)stack.push({x:n.x,y:n.y});
  }
  const cells=[...seen].map(k=>{const a=k.split(",").map(Number);return{x:a[0],y:a[1]}});
  edges/=2;
  return {cells,edges,loop:cells.length>=4&&edges>=cells.length};
}
function hasOpenPort(p,comp){
  const set=new Set(comp.cells.map(c=>c.x+","+c.y));
  for(const c of comp.cells){
    const b=p.grid[c.y]?.[c.x]; if(!b||b.charred)continue;
    for(const d of DIRS){
      if(!(b.mask&d.bit))continue;
      const nx=c.x+d.x,ny=c.y+d.y,k=nx+","+ny;
      if(set.has(k))continue;
      if(nx<0||nx>=COLS||ny<0||ny>=ROWS)continue;
      const nb=p.grid[ny]?.[nx];
      if(!nb)return true;
      if(!nb.charred&&(nb.mask&d.opp))return true;
    }
  }
  return false;
}
function burnCells(p,cells,loop){
  const set=new Set(cells.map(c=>c.x+","+c.y));
  if(loop){
    for(const c of cells)for(let yy=c.y-1;yy<=c.y+1;yy++)for(let xx=c.x-1;xx<=c.x+1;xx++){
      if(xx>=0&&xx<COLS&&yy>=0&&yy<ROWS&&p.grid[yy][xx])set.add(xx+","+yy);
    }
  }
  const final=[...set].map(k=>{const a=k.split(",").map(Number);return{x:a[0],y:a[1]}});
  for(const c of final){const b=p.grid[c.y]?.[c.x];if(b)b.burn=loop?42:28}
  setTimeout(()=>{
    let rem=0;
    for(const c of final)if(p.grid[c.y]?.[c.x]){p.grid[c.y][c.x]=null;rem++}
    if(rem){
      p.combo++;
      p.score+=rem*100*p.combo+(loop?800:0);
      const e=p===P1?P2:P1;
      e.pendingLightning+=Math.max(1,Math.floor(rem/3)+p.combo-1+(loop?2:0));
      p.spark.colorIndex=(p.spark.colorIndex+1)%SPARK_COLORS.length;
      p.spark.chain=0;p.spark.speed=2.8;p.flash=20;
      gravity(p);
      msg((loop?"大炎上":"SPARK")+"\n"+rem+" BLOCK");
    }
  },loop?380:260);
}
function teleportSpark(p,s){
  let tries=0;
  do{s.x=rnd(COLS);s.y=rnd(ROWS);tries++}while((!p.grid[s.y][s.x]||p.grid[s.y][s.x].charred)&&tries<60);
  s.fromX=s.renderX=s.x;s.fromY=s.renderY=s.y;s.t=0;s.chain=0;s.speed=2.8;
}
function stepSpark(p,dt){
  const s=p.spark;
  for(const tr of s.trail)tr.a*=Math.pow(.2,dt);
  s.t+=dt*s.speed;
  while(s.t>=1){
    s.t-=1;
    const b=p.grid[s.y]?.[s.x];
    if(!b||b.charred){teleportSpark(p,s);break}
    const options=connectedNeighbors(p,s.x,s.y);
    if(options.length){
      let next=options.find(n=>n.dir!==(s.dir+2)%4)||options[rnd(options.length)];
      if(Math.random()<.16)next=options[rnd(options.length)];
      s.fromX=s.x;s.fromY=s.y;s.x=next.x;s.y=next.y;s.dir=next.dir;s.chain++;
      s.trail.push({x:s.fromX,y:s.fromY,a:1,color:SPARK_COLORS[s.colorIndex]});
      if(s.trail.length>24)s.trail.shift();
      const comp=findComponent(p,s.x,s.y);
      if(comp.cells.length>=4){
        s.speed=Math.max(1.2,2.8-comp.cells.length*.12);
        if(s.chain>=Math.max(4,Math.floor(comp.cells.length*.85)))burnCells(p,comp.cells,comp.loop);
      }else if(!hasOpenPort(p,comp)){
        for(const c of comp.cells){const bb=p.grid[c.y]?.[c.x];if(bb){bb.charred=true;bb.mask=0;bb.color="#2b2b2b";bb.shock=40}}
        teleportSpark(p,s);
      }else s.speed=2.8;
    }else{
      const comp=findComponent(p,s.x,s.y);
      if(comp.cells.length&& !hasOpenPort(p,comp)){
        for(const c of comp.cells){const bb=p.grid[c.y]?.[c.x];if(bb){bb.charred=true;bb.mask=0;bb.color="#2b2b2b";bb.shock=40}}
      }
      teleportSpark(p,s);
      break;
    }
  }
  const e=s.t*s.t*(3-2*s.t);
  s.renderX=s.fromX+(s.x-s.fromX)*e;
  s.renderY=s.fromY+(s.y-s.fromY)*e;
}
function updatePlayer(p,dt,human){
  if(p.gameOver)return;
  if(!p.active)spawn(p);
  const input=p.input||keys;
  if(human){
    if(input.has("ArrowLeft")&&canMove(p,-1,0)){p.active.x--;input.delete("ArrowLeft")}
    if(input.has("ArrowRight")&&canMove(p,1,0)){p.active.x++;input.delete("ArrowRight")}
    if(input.has("ArrowUp")){rotateActive(p);input.delete("ArrowUp")}
    if(input.has("Space")){hardDrop(p);input.delete("Space")}
    if(input.has("ArrowDown"))p.fallTimer+=dt*5;
  }else{
    p.aiTimer+=dt;
    if(p.aiTimer>.24){
      p.aiTimer=0;const r=Math.random();
      if(r<.3&&canMove(p,-1,0))p.active.x--;
      else if(r<.6&&canMove(p,1,0))p.active.x++;
      else if(r<.75)rotateActive(p);
    }
  }
  p.fallTimer+=dt;
  if(p.fallTimer>.62){
    p.fallTimer=0;
    if(canMove(p,0,1))p.active.y++;else lockBlock(p);
  }
  stepSpark(p,dt);
  if(p.flash>0)p.flash--;
}

function packBlock(b){return cloneBlock(b)}
function unpackBlock(b){return cloneBlock(b)}
function packPlayer(p){
  return {
    grid:p.grid.map(r=>r.map(packBlock)),active:p.active?{x:p.active.x,y:p.active.y,block:packBlock(p.active.block)}:null,
    next:packBlock(p.next),score:p.score,combo:p.combo,pendingLightning:p.pendingLightning,fallTimer:p.fallTimer,
    aiTimer:p.aiTimer,spark:p.spark,gameOver:p.gameOver,flash:p.flash,name:p.name
  };
}
function applyPlayer(p,s){
  if(!s)return;
  p.grid=(s.grid||[]).map(r=>r.map(unpackBlock));
  while(p.grid.length<ROWS)p.grid.push(Array(COLS).fill(null));
  p.grid=p.grid.slice(0,ROWS).map(r=>{while(r.length<COLS)r.push(null);return r.slice(0,COLS)});
  p.active=s.active?{x:s.active.x,y:s.active.y,block:unpackBlock(s.active.block)}:null;
  p.next=unpackBlock(s.next)||makeBlock();
  p.score=s.score||0;p.combo=s.combo||0;p.pendingLightning=s.pendingLightning||0;p.fallTimer=s.fallTimer||0;p.aiTimer=s.aiTimer||0;
  p.spark=s.spark||p.spark;p.gameOver=!!s.gameOver;p.flash=s.flash||0;p.name=s.name||p.name;
}
function initFirebase(){
  try{
    if(db)return true;
    if(!window.firebase||!firebase.database){setStatus("Firebase読込不可。GitHub Pagesで再読み込み。");return false}
    if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);
    db=firebase.database();
    return true;
  }catch(e){setStatus("Firebase初期化エラー: "+(e.message||e));return false}
}
function roomPath(){return "spark_wire_rooms/"+safeRoom(roomInput.value)}
function listenPlayers(){
  roomRef.child("players/p1").on("value",s=>{if(localSide!=="p1")applyPlayer(P1,s.val())});
  roomRef.child("players/p2").on("value",s=>{if(localSide!=="p2")applyPlayer(P2,s.val())});
}
function sendMine(){
  if(!roomRef||mode==="solo"||localSide==="solo")return;
  const p=localSide==="p1"?P1:P2;
  roomRef.child("players/"+localSide).set(packPlayer(p)).catch(e=>setStatus("送信エラー: "+(e.message||e)));
}
function resize(){
  const dpr=Math.max(1,Math.min(devicePixelRatio||1,2));
  const rect=canvas.getBoundingClientRect();
  W=Math.max(320,rect.width||window.innerWidth||360);
  H=Math.max(420,rect.height||Math.floor((window.innerHeight||720)*.78));
  canvas.width=Math.floor(W*dpr);canvas.height=Math.floor(H*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);
  gap=Math.max(8,Math.floor(W*.018));
  cell=Math.floor(Math.min((W-gap-24)/(COLS*2),(H-52)/ROWS));
  cell=Math.max(16,Math.min(cell,42));
  const tw=cell*COLS*2+gap;
  leftX=Math.floor((W-tw)/2);rightX=Math.floor(leftX+cell*COLS+gap);boardTop=Math.floor(Math.max(42,(H-cell*ROWS)/2+16));
}
function reset(){
  Object.assign(P1,makePlayer("L"));Object.assign(P2,makePlayer("R"));
  if(mode==="host"){P1.input=keys;P2.input=remoteKeys;P1.name=(nameInput.value||"HOST").slice(0,16);P2.name="JOIN"}
  else if(mode==="join"){P1.input=remoteKeys;P2.input=keys;P1.name="HOST";P2.name=(nameInput.value||"JOIN").slice(0,16)}
  else{P1.input=keys;P2.input=remoteKeys}
  running=true;spawn(P1);spawn(P2);
}
async function startHost(){
  resize();reset();
  if(!initFirebase())return;
  mode="host";localSide="p1";roomRef=db.ref(roomPath());
  await roomRef.set({meta:{host:P1.name,createdAt:firebase.database.ServerValue.TIMESTAMP},players:{p1:packPlayer(P1),p2:packPlayer(P2)}});
  listenPlayers();panel.style.display="none";badge.textContent="HOST ROOM "+safeRoom(roomInput.value);setStatus("HOST開始");
}
async function startJoin(){
  resize();reset();
  if(!initFirebase())return;
  mode="join";localSide="p2";roomRef=db.ref(roomPath());
  const s=await roomRef.child("players/p1").get();
  if(!s.exists()){setStatus("部屋なし。HOST作成後にJOIN");return}
  applyPlayer(P1,s.val());
  await roomRef.child("meta/join").set(P2.name);
  await roomRef.child("players/p2").set(packPlayer(P2));
  listenPlayers();panel.style.display="none";badge.textContent="JOIN ROOM "+safeRoom(roomInput.value);setStatus("JOIN開始");
}
function startSolo(){
  mode="solo";localSide="solo";resize();reset();panel.style.display="none";badge.textContent="SOLO";setStatus("SOLO開始");
}
function bind(id,fn){
  const el=document.getElementById(id);
  let lock=false;
  const run=e=>{if(e)e.preventDefault();if(lock)return;lock=true;setTimeout(()=>lock=false,300);fn()};
  el.addEventListener("click",run);el.addEventListener("touchend",run,{passive:false});el.addEventListener("pointerup",run);
}
function roundRect(x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}
function drawWire(cx,cy,mask,color,charred){
  ctx.lineCap="round";ctx.lineJoin="round";ctx.lineWidth=Math.max(4,cell*.13);ctx.strokeStyle=charred?"#111":color;ctx.shadowColor=charred?"transparent":color;ctx.shadowBlur=charred?0:8;
  for(const d of DIRS){if(!(mask&d.bit))continue;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+d.x*cell*.42,cy+d.y*cell*.42);ctx.stroke()}
  ctx.shadowBlur=0;ctx.fillStyle=charred?"#030303":"#fff";ctx.beginPath();ctx.arc(cx,cy,Math.max(3,cell*.07),0,Math.PI*2);ctx.fill();
}
function drawBlock(px,py,b,a=1){
  if(!b)return;ctx.save();ctx.globalAlpha=a;
  const g=ctx.createLinearGradient(px,py,px+cell,py+cell);g.addColorStop(0,b.charred?"#3a2a20":"#31405f");g.addColorStop(1,b.charred?"#050505":"#101a2c");
  ctx.fillStyle=g;ctx.strokeStyle=b.charred?"#755034":"rgba(255,255,255,.25)";ctx.lineWidth=2;roundRect(px+2,py+2,cell-4,cell-4,10);ctx.fill();ctx.stroke();
  if(b.shock>0){ctx.strokeStyle="#fff15a";ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(px+cell*.2,py+cell*.12);ctx.lineTo(px+cell*.55,py+cell*.45);ctx.lineTo(px+cell*.38,py+cell*.48);ctx.lineTo(px+cell*.78,py+cell*.9);ctx.stroke();b.shock--}
  drawWire(px+cell/2,py+cell/2,b.mask,b.color,b.charred);
  if(b.burn>0){ctx.globalAlpha=Math.min(1,b.burn/42);ctx.fillStyle="#ff5b22";ctx.shadowColor="#ffde59";ctx.shadowBlur=18;ctx.beginPath();ctx.arc(px+cell/2,py+cell/2,cell*.36,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;b.burn--}
  ctx.restore();
}
function drawSpark(p,ox,oy){
  const s=p.spark,c=SPARK_COLORS[s.colorIndex];
  for(const t of s.trail){ctx.globalAlpha=t.a*.55;ctx.fillStyle=t.color;ctx.shadowColor=t.color;ctx.shadowBlur=14;ctx.beginPath();ctx.arc(ox+t.x*cell+cell/2,oy+t.y*cell+cell/2,cell*.12,0,Math.PI*2);ctx.fill()}
  ctx.globalAlpha=1;ctx.shadowColor=c;ctx.shadowBlur=22;ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(ox+s.renderX*cell+cell/2,oy+s.renderY*cell+cell/2,cell*.18,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
}
function drawHud(p,ox,oy){
  ctx.fillStyle="#f8fbff";ctx.textAlign="left";ctx.font=`900 ${Math.max(11,cell*.32)}px system-ui`;ctx.fillText(p.name,ox,oy-24);
  ctx.font=`800 ${Math.max(9,cell*.25)}px system-ui`;ctx.fillText("SCORE "+p.score,ox,oy-8);
  ctx.textAlign="right";ctx.fillText("⚡"+p.pendingLightning+" COMBO "+p.combo,ox+cell*COLS,oy-8);
  drawBlock(ox+cell*COLS-cell*.9,oy-43,p.next,.72);
}
function drawPlayer(p,ox){
  const oy=boardTop;
  ctx.fillStyle="rgba(4,9,18,.72)";ctx.strokeStyle=p.flash>0?"#fff15a":"rgba(123,209,255,.38)";ctx.lineWidth=p.flash>0?4:2;roundRect(ox-5,oy-5,cell*COLS+10,cell*ROWS+10,14);ctx.fill();ctx.stroke();
  ctx.strokeStyle="rgba(255,255,255,.08)";ctx.lineWidth=1;
  for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(ox+x*cell,oy);ctx.lineTo(ox+x*cell,oy+ROWS*cell);ctx.stroke()}
  for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(ox,oy+y*cell);ctx.lineTo(ox+COLS*cell,oy+y*cell);ctx.stroke()}
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++)if(p.grid[y][x])drawBlock(ox+x*cell,oy+y*cell,p.grid[y][x]);
  if(p.active){drawBlock(ox+p.active.x*cell,oy+p.active.y*cell,p.active.block,.98);let gy=p.active.y;while(gy+1<ROWS&&!p.grid[gy+1][p.active.x])gy++;if(gy!==p.active.y)drawBlock(ox+p.active.x*cell,oy+gy*cell,p.active.block,.22)}
  drawSpark(p,ox,oy);drawHud(p,ox,oy);
}
function drawCenterInfo(){
  ctx.textAlign="center";ctx.fillStyle="rgba(255,255,255,.88)";ctx.font=`900 ${Math.max(10,cell*.28)}px system-ui`;
  ["HOST左 / JOIN右","左右スワイプ移動","ダブルタップ回転","下スワイプ加速","長押し即落下"].forEach((t,i)=>ctx.fillText(t,W/2,boardTop+cell*(1.8+i*.55)));
}
function draw(){
  ctx.clearRect(0,0,W,H);drawPlayer(P1,leftX);drawPlayer(P2,rightX);drawCenterInfo();
}
function update(now){
  const dt=Math.min(.05,(now-last)/1000);last=now;
  if(running){
    if(mode==="host")updatePlayer(P1,dt,true);
    else if(mode==="join")updatePlayer(P2,dt,true);
    else{updatePlayer(P1,dt,true);updatePlayer(P2,dt,false)}
    if(mode!=="solo"&&now-lastNet>70){lastNet=now;sendMine()}
  }
  draw();requestAnimationFrame(update);
}

let sx=0,sy=0,lx=0,ly=0,touch=false,moved=false,lastTap=0,longTimer=null;
function tapKey(k){keys.add(k);setTimeout(()=>keys.delete(k),55)}
canvas.addEventListener("pointerdown",e=>{e.preventDefault();if(!running)return;touch=true;moved=false;sx=lx=e.clientX;sy=ly=e.clientY;clearTimeout(longTimer);longTimer=setTimeout(()=>{if(touch&&!moved){moved=true;tapKey("Space")}},430)});
canvas.addEventListener("pointermove",e=>{if(!touch)return;e.preventDefault();const dx=e.clientX-sx,dy=e.clientY-sy,step=e.clientX-lx,th=Math.max(22,cell*.42);if(Math.abs(dx)>th||Math.abs(dy)>th){moved=true;clearTimeout(longTimer)}if(Math.abs(dx)>Math.abs(dy)){if(step>th){tapKey("ArrowRight");lx=e.clientX}else if(step<-th){tapKey("ArrowLeft");lx=e.clientX}}else if(dy>th){keys.add("ArrowDown")}});
canvas.addEventListener("pointerup",e=>{e.preventDefault();touch=false;keys.delete("ArrowDown");clearTimeout(longTimer);if(!moved){const n=performance.now();if(n-lastTap<300){tapKey("ArrowUp");lastTap=0}else lastTap=n}});
canvas.addEventListener("pointercancel",()=>{touch=false;keys.delete("ArrowDown");clearTimeout(longTimer)});

for(const b of document.querySelectorAll("#controls button")){
  const k=b.dataset.k;
  b.addEventListener("pointerdown",e=>{e.preventDefault();keys.add(k)});
  b.addEventListener("pointerup",e=>{e.preventDefault();keys.delete(k)});
  b.addEventListener("pointercancel",()=>keys.delete(k));
  b.addEventListener("pointerleave",()=>keys.delete(k));
}
window.addEventListener("keydown",e=>{if(["ArrowLeft","ArrowRight","ArrowDown","ArrowUp","Space"].includes(e.code)){e.preventDefault();keys.add(e.code)}});
window.addEventListener("keyup",e=>keys.delete(e.code));
window.addEventListener("resize",resize);

bind("hostBtn",startHost);
bind("joinBtn",startJoin);
bind("soloBtn",startSolo);

resize();
requestAnimationFrame(update);
})();
</script>
</body>
</html>
