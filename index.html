<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>MiniCraft Multiplayer</title><style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#87ceeb;font-family:sans-serif;touch-action:none;user-select:none}#renderCanvas{width:100%;height:100%;display:block;touch-action:none}#ui{position:fixed;left:10px;top:10px;color:white;font-weight:bold;text-shadow:0 2px 5px #000;z-index:10;font-size:14px;line-height:1.5;pointer-events:none}#panel{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:30;color:white;display:flex;align-items:center;justify-content:center;padding:20px}#panelInner{width:min(440px,92vw);background:#1f2937;border:1px solid rgba(255,255,255,.2);border-radius:18px;padding:18px;box-shadow:0 10px 35px rgba(0,0,0,.45)}#panel h1{margin:0 0 10px;font-size:24px}#panel p{font-size:14px;line-height:1.5;color:#d1d5db}input{width:100%;box-sizing:border-box;font-size:18px;padding:12px;border-radius:12px;border:0;margin:8px 0}.panelBtn{width:100%;font-size:18px;font-weight:bold;padding:12px;margin-top:10px;border:0;border-radius:12px;background:#22c55e;color:white}.panelBtn.secondary{background:#3b82f6}#crosshair{position:fixed;left:50%;top:50%;width:22px;height:22px;margin-left:-11px;margin-top:-11px;z-index:6;pointer-events:none}#crosshair:before,#crosshair:after{content:"";position:absolute;background:white;box-shadow:0 1px 4px #000}#crosshair:before{left:10px;top:2px;width:2px;height:18px}#crosshair:after{left:2px;top:10px;width:18px;height:2px}.stick{position:fixed;bottom:28px;width:150px;height:150px;border-radius:50%;background:rgba(0,0,0,.22);border:2px solid rgba(255,255,255,.35);z-index:10;touch-action:none}#moveStick{left:24px}#lookStick{right:24px}.knob{position:absolute;left:50px;top:50px;width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.45);border:2px solid rgba(255,255,255,.7)}#actions{position:fixed;left:50%;bottom:34px;transform:translateX(-50%);display:flex;gap:12px;z-index:10}.act{width:82px;height:58px;border-radius:16px;border:2px solid rgba(255,255,255,.45);background:rgba(0,0,0,.35);color:white;font-weight:bold}#cameraPreview{position:fixed;right:10px;top:10px;width:80px;height:60px;border-radius:10px;z-index:12;border:2px solid rgba(255,255,255,.7);object-fit:cover;background:#111}#status{position:fixed;left:10px;bottom:10px;color:white;background:rgba(0,0,0,.35);padding:6px 10px;border-radius:10px;z-index:11;font-size:12px}
</style></head><body>
<div id="panel"><div id="panelInner"><h1>MiniCraft Multiplayer</h1><p>HOSTは部屋を作成。JOINは同じRoom IDで参加。</p><input id="nameInput" placeholder="プレイヤー名" value=""><input id="roomInput" placeholder="Room ID 例: TEST123"><button class="panelBtn" id="hostBtn">HOSTで開始</button><button class="panelBtn secondary" id="joinBtn">JOINで参加</button><p id="panelMsg"></p></div></div>
<div id="ui">MiniCraft MP<br>左:移動 / 右:視点<br>BREAK:壊す / PLACE:置く / JUMP:1.5段</div><div id="crosshair"></div><video id="cameraPreview" autoplay playsinline muted></video><div id="status">未接続</div><canvas id="renderCanvas"></canvas><div class="stick" id="moveStick"><div class="knob" id="moveKnob"></div></div><div class="stick" id="lookStick"><div class="knob" id="lookKnob"></div></div><div id="actions"><button class="act" id="breakBtn">BREAK</button><button class="act" id="placeBtn">PLACE</button><button class="act" id="jumpBtn">JUMP<br>1.5</button></div>
<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getDatabase, ref, set, update, onValue, onDisconnect, remove, get } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";
const firebaseConfig={apiKey:"AIzaSyCuC8k-Bkrj3MFcExjsWjnVxQR0WMYeTlY",authDomain:"minicra.firebaseapp.com",databaseURL:"https://minicra-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"minicra",storageBucket:"minicra.firebasestorage.app",messagingSenderId:"943025034725",appId:"1:943025034725:web:c46da7ded946ce4fde0b0c"};
const app=initializeApp(firebaseConfig),db=getDatabase(app);
const statusEl=document.getElementById('status'),panel=document.getElementById('panel'),panelMsg=document.getElementById('panelMsg'),nameInput=document.getElementById('nameInput'),roomInput=document.getElementById('roomInput'),video=document.getElementById('cameraPreview');
const playerId='p_'+Math.random().toString(36).slice(2,10);let roomId='',isHost=false,playerName='',connected=false;
function setStatus(t){statusEl.textContent=t}function safeRoom(s){return(s||'').toUpperCase().replace(/[^A-Z0-9_-]/g,'').slice(0,20)}function randomRoom(){return Math.random().toString(36).slice(2,8).toUpperCase()}
document.getElementById('hostBtn').onclick=()=>startGame(true);document.getElementById('joinBtn').onclick=()=>startGame(false);
async function startGame(host){playerName=(nameInput.value||'Player').slice(0,16);roomId=safeRoom(roomInput.value)||randomRoom();roomInput.value=roomId;isHost=host;const roomRef=ref(db,'rooms/'+roomId);if(isHost){await set(roomRef,{meta:{host:playerId,createdAt:Date.now(),updatedAt:Date.now()},blocks:exportBlocks(),players:{}})}else{const snap=await get(roomRef);if(!snap.exists()){panelMsg.textContent='そのRoom IDは存在しません。先にHOSTで作成してください。';return}}await set(ref(db,`rooms/${roomId}/players/${playerId}`),{id:playerId,name:playerName,x:player.x,y:player.y,z:player.z,yaw:player.yaw,pitch:player.pitch,face:'',updatedAt:Date.now()});onDisconnect(ref(db,`rooms/${roomId}/players/${playerId}`)).remove();attachRoomSync();panel.style.display='none';connected=true;setStatus((isHost?'HOST':'JOIN')+' Room: '+roomId);startCamera();setInterval(pushPlayerState,100);setInterval(pushFaceImage,2200);if(isHost)setInterval(()=>update(ref(db,`rooms/${roomId}/meta`),{updatedAt:Date.now()}),2000)}
const canvas=document.getElementById('renderCanvas'),engine=new BABYLON.Engine(canvas,true),scene=new BABYLON.Scene(engine);scene.clearColor=new BABYLON.Color3(.55,.78,1);const camera=new BABYLON.FreeCamera('camera',new BABYLON.Vector3(0,2.2,-6),scene);camera.minZ=.1;camera.fov=1.05;const hemi=new BABYLON.HemisphericLight('hemi',new BABYLON.Vector3(0,1,0),scene);hemi.intensity=.9;const sun=new BABYLON.DirectionalLight('sun',new BABYLON.Vector3(-.35,-1,.25),scene);sun.position=new BABYLON.Vector3(20,40,-20);sun.intensity=.7;
function makeMat(n,r,g,b){const m=new BABYLON.StandardMaterial(n,scene);m.diffuseColor=new BABYLON.Color3(r,g,b);return m}const mats={grass:makeMat('grass',.18,.7,.22),dirt:makeMat('dirt',.42,.25,.12),stone:makeMat('stone',.42,.42,.42),wood:makeMat('wood',.45,.24,.08),leaf:makeMat('leaf',.05,.48,.12)};
const blocks=new Map();function k(x,y,z){return x+','+y+','+z}function addBlockLocal(x,y,z,type){const id=k(x,y,z);if(blocks.has(id))return;const b=BABYLON.MeshBuilder.CreateBox('block',{size:1},scene);b.position.set(x,y+.5,z);b.material=mats[type]||mats.grass;b.metadata={x,y,z,type};blocks.set(id,b)}function removeBlockLocal(x,y,z){const id=k(x,y,z),b=blocks.get(id);if(!b)return;b.dispose();blocks.delete(id)}function existsBlock(x,y,z){return blocks.has(k(x,y,z))}function topYAt(x,z){const ix=Math.round(x),iz=Math.round(z);let best=-999;for(const b of blocks.values()){const m=b.metadata;if(m.x===ix&&m.z===iz&&m.y>best)best=m.y}return best}function exportBlocks(){const out={};for(const[id,b]of blocks)out[id]=b.metadata.type;return out}function loadBlocks(data){const wanted=new Set(Object.keys(data||{}));for(const id of Array.from(blocks.keys()))if(!wanted.has(id)){const b=blocks.get(id);b.dispose();blocks.delete(id)}for(const[id,type]of Object.entries(data||{}))if(!blocks.has(id)){const[x,y,z]=id.split(',').map(Number);addBlockLocal(x,y,z,type)}}
function initWorld(){for(let x=-12;x<=12;x++)for(let z=-12;z<=12;z++){const h=(Math.sin(x*.55)+Math.cos(z*.45)>1.25)?1:0;addBlockLocal(x,0,z,'grass');addBlockLocal(x,-1,z,'dirt');if(h)addBlockLocal(x,1,z,'grass');if(Math.random()<.035)addBlockLocal(x,h+1,z,'stone')}for(let tx of[-8,0,8])for(let tz of[-8,0,8]){const gy=topYAt(tx,tz);addBlockLocal(tx,gy+1,tz,'wood');addBlockLocal(tx,gy+2,tz,'wood');addBlockLocal(tx,gy+3,tz,'wood');for(let lx=-1;lx<=1;lx++)for(let lz=-1;lz<=1;lz++)addBlockLocal(tx+lx,gy+4,tz+lz,'leaf');addBlockLocal(tx,gy+5,tz,'leaf')}}initWorld();
const marker=BABYLON.MeshBuilder.CreateBox('marker',{size:1.04},scene),markerMat=makeMat('markerMat',1,1,1);markerMat.alpha=.25;marker.material=markerMat;marker.isVisible=false;
const player={x:0,y:5,z:-5,vy:0,height:1.75,radius:.28,yaw:0,pitch:0};let moveVec={x:0,y:0},lookVec={x:0,y:0};
function setupStick(stickId,knobId,target){const stick=document.getElementById(stickId),knob=document.getElementById(knobId);let activeId=null;const max=50;function setKnob(dx,dy){const len=Math.hypot(dx,dy);if(len>max){dx=dx/len*max;dy=dy/len*max}knob.style.left=50+dx+'px';knob.style.top=50+dy+'px';target.x=dx/max;target.y=dy/max}function reset(){activeId=null;knob.style.left='50px';knob.style.top='50px';target.x=0;target.y=0}stick.addEventListener('touchstart',e=>{e.preventDefault();if(activeId!==null)return;const t=e.changedTouches[0];activeId=t.identifier;const r=stick.getBoundingClientRect();setKnob(t.clientX-(r.left+75),t.clientY-(r.top+75))},{passive:false});stick.addEventListener('touchmove',e=>{e.preventDefault();if(activeId===null)return;const r=stick.getBoundingClientRect();for(const t of e.changedTouches)if(t.identifier===activeId)setKnob(t.clientX-(r.left+75),t.clientY-(r.top+75))},{passive:false});stick.addEventListener('touchend',e=>{e.preventDefault();for(const t of e.changedTouches)if(t.identifier===activeId)reset()},{passive:false});stick.addEventListener('touchcancel',reset)}setupStick('moveStick','moveKnob',moveVec);setupStick('lookStick','lookKnob',lookVec);
function pickBlock(){const ray=new BABYLON.Ray(camera.position,camera.getForwardRay(6).direction,6),hit=scene.pickWithRay(ray,mesh=>mesh.metadata&&mesh.metadata.type);return hit&&hit.hit?hit:null}function normalDir(hit){const n=hit.getNormal(true);return new BABYLON.Vector3(Math.round(n.x),Math.round(n.y),Math.round(n.z))}async function syncBlockSet(x,y,z,type){addBlockLocal(x,y,z,type);if(connected)await set(ref(db,`rooms/${roomId}/blocks/${k(x,y,z)}`),type)}async function syncBlockRemove(x,y,z){removeBlockLocal(x,y,z);if(connected)await remove(ref(db,`rooms/${roomId}/blocks/${k(x,y,z)}`))}
document.getElementById('breakBtn').addEventListener('touchstart',e=>{e.preventDefault();const hit=pickBlock();if(!hit)return;const m=hit.pickedMesh.metadata;syncBlockRemove(m.x,m.y,m.z)},{passive:false});document.getElementById('placeBtn').addEventListener('touchstart',e=>{e.preventDefault();const hit=pickBlock();if(!hit)return;const m=hit.pickedMesh.metadata,n=normalDir(hit),nx=m.x+n.x,ny=m.y+n.y,nz=m.z+n.z,px=Math.round(player.x),pz=Math.round(player.z);if(nx===px&&nz===pz&&ny>=Math.floor(player.y-1.7)&&ny<=Math.floor(player.y))return;syncBlockSet(nx,ny,nz,'dirt')},{passive:false});
function isGrounded(){return Math.abs(player.y-groundHeightAt(player.x,player.z))<.06&&player.vy===0}
function doJump(){if(isGrounded())player.vy=.24}
const jumpBtn=document.getElementById('jumpBtn');jumpBtn.addEventListener('touchstart',e=>{e.preventDefault();doJump()},{passive:false});jumpBtn.addEventListener('mousedown',e=>{e.preventDefault();doJump()});
function playerBlocked(nx,ny,nz){const feetY=Math.floor(ny-player.height+.15),headY=Math.floor(ny-.15),minX=Math.floor(nx-player.radius),maxX=Math.floor(nx+player.radius),minZ=Math.floor(nz-player.radius),maxZ=Math.floor(nz+player.radius);for(let x=minX;x<=maxX;x++)for(let y=feetY;y<=headY;y++)for(let z=minZ;z<=maxZ;z++)if(existsBlock(x,y,z))return true;return false}
function groundHeightAt(px,pz){let best=-999;const minX=Math.floor(px-player.radius),maxX=Math.floor(px+player.radius),minZ=Math.floor(pz-player.radius),maxZ=Math.floor(pz+player.radius);for(let x=minX;x<=maxX;x++)for(let z=minZ;z<=maxZ;z++){const ty=topYAt(x,z);if(ty>best)best=ty}return best+1+player.height}
function tryStepMove(nx,nz){if(!playerBlocked(nx,player.y,nz)){player.x=nx;player.z=nz;return}if(player.vy!==0)return;const curGround=groundHeightAt(player.x,player.z),nextGround=groundHeightAt(nx,nz),step=nextGround-curGround;if(step>.03&&step<=1.08&&!playerBlocked(nx,nextGround,nz)){player.x=nx;player.z=nz;player.y=nextGround;player.vy=0}}
function updatePlayer(){player.yaw+=lookVec.x*.045;player.pitch+=lookVec.y*.03;player.pitch=Math.max(-1.1,Math.min(1,player.pitch));const forward=new BABYLON.Vector3(Math.sin(player.yaw),0,Math.cos(player.yaw)),right=new BABYLON.Vector3(Math.cos(player.yaw),0,-Math.sin(player.yaw)),dx=(right.x*moveVec.x+forward.x*-moveVec.y)*.13,dz=(right.z*moveVec.x+forward.z*-moveVec.y)*.13;tryStepMove(player.x+dx,player.z);tryStepMove(player.x,player.z+dz);player.vy-=.018;let ny=player.y+player.vy;if(player.vy<=0){const groundY=groundHeightAt(player.x,player.z);if(ny<=groundY){ny=groundY;player.vy=0}}if(!playerBlocked(player.x,ny,player.z))player.y=ny;else player.vy=0;camera.position.set(player.x,player.y-.1,player.z);camera.rotation.x=player.pitch;camera.rotation.y=player.yaw}
const otherPlayers=new Map();function makePlayerMesh(id){const root=new BABYLON.TransformNode('op_'+id,scene),body=BABYLON.MeshBuilder.CreateBox('body_'+id,{width:.65,height:1.25,depth:.35},scene);body.parent=root;body.position.y=.62;body.material=makeMat('bodyMat_'+id,0.1+Math.random()*.8,0.2+Math.random()*.7,0.4+Math.random()*.5);const face=BABYLON.MeshBuilder.CreatePlane('face_'+id,{width:.75,height:.55},scene);face.parent=root;face.position.y=1.55;face.billboardMode=BABYLON.Mesh.BILLBOARDMODE_ALL;const tex=new BABYLON.DynamicTexture('faceTex_'+id,{width:128,height:96},scene,false),fm=new BABYLON.StandardMaterial('faceMat_'+id,scene);fm.diffuseTexture=tex;fm.emissiveColor=new BABYLON.Color3(1,1,1);face.material=fm;return{root,body,face,tex,lastFace:''}}function drawFace(op,imgData,name){const ctx=op.tex.getContext();ctx.fillStyle='#111';ctx.fillRect(0,0,128,96);if(imgData){const img=new Image();img.onload=()=>{ctx.drawImage(img,0,0,128,96);ctx.fillStyle='white';ctx.font='14px sans-serif';ctx.fillText(name||'P',5,90);op.tex.update()};img.src=imgData}else{ctx.fillStyle='white';ctx.font='18px sans-serif';ctx.fillText(name||'Player',12,52);op.tex.update()}}
function attachRoomSync(){onValue(ref(db,`rooms/${roomId}/blocks`),snap=>loadBlocks(snap.val()||{}));onValue(ref(db,`rooms/${roomId}/players`),snap=>{const players=snap.val()||{},seen=new Set(Object.keys(players));for(const[id,p]of Object.entries(players)){if(id===playerId)continue;if(!otherPlayers.has(id)){const op=makePlayerMesh(id);otherPlayers.set(id,op);drawFace(op,p.face,p.name)}const op=otherPlayers.get(id);op.root.position.set(p.x||0,(p.y||2)-1.75,p.z||0);op.root.rotation.y=p.yaw||0;if(op.lastFace!==p.face){op.lastFace=p.face;drawFace(op,p.face,p.name)}}for(const[id,op]of Array.from(otherPlayers.entries()))if(!seen.has(id)){op.root.dispose();otherPlayers.delete(id)}})}async function pushPlayerState(){if(!connected)return;await update(ref(db,`rooms/${roomId}/players/${playerId}`),{x:+player.x.toFixed(3),y:+player.y.toFixed(3),z:+player.z.toFixed(3),yaw:+player.yaw.toFixed(3),pitch:+player.pitch.toFixed(3),updatedAt:Date.now()})}async function startCamera(){try{const stream=await navigator.mediaDevices.getUserMedia({audio:false,video:{facingMode:'user',width:{ideal:160},height:{ideal:120}}});video.srcObject=stream}catch(e){setStatus((isHost?'HOST':'JOIN')+' Room: '+roomId+' / カメラ不可')}}async function pushFaceImage(){if(!connected||!video.videoWidth)return;const c=document.createElement('canvas');c.width=96;c.height=72;const ctx=c.getContext('2d');ctx.drawImage(video,0,0,c.width,c.height);const data=c.toDataURL('image/jpeg',.38);await update(ref(db,`rooms/${roomId}/players/${playerId}`),{face:data})}
engine.runRenderLoop(()=>{updatePlayer();const hit=pickBlock();if(hit){marker.isVisible=true;marker.position.copyFrom(hit.pickedMesh.position)}else marker.isVisible=false;scene.render()});window.addEventListener('resize',()=>engine.resize());
</script></body></html>
