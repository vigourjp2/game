function mat(n,r,g,b,a=1){const m=new BABYLON.StandardMaterial(n,scene);m.diffuseColor=new BABYLON.Color3(r,g,b);m.alpha=a;return m}
const mGround=mat("ground",.28,.7,.22),mBrick=mat("brick",.65,.35,.16),mBody=mat("body",1,.18,.15),mHead=mat("head",1,.75,.55),mCoin=mat("coin",1,.82,.05),mEnemy=mat("enemy",.12,.1,.1),mGoal=mat("goal",.2,.8,1);
const mSteel=mat("steel",.46,.48,.52),mSpring=mat("spring",.85,.15,.9),mSteam=mat("steam",.9,.95,1,.35),mWater=mat("water",.05,.38,1,.48),mItem=mat("item",.1,1,.55),mBoss=mat("boss",.55,.05,.1),mSky=mat("skyEnemy",1,.08,.08),mLava=mat("lava",1,.25,.04,.78),mParachute=mat("para",1,1,1,.8),mWarning=mat("warning",1,.95,.05,.82),mBomb=mat("bomb",.08,.08,.08),mFuse=mat("fuse",1,.45,.05,.85),mExplosion=mat("explosion",1,.55,.05,.55),mClear=mat("clear",1,1,.2,.8);
const mShotPower=[mLava,mat("shotLv1",1,.45,.05,.85),mat("shotLv2",1,.05,.05,.9),mat("shotLv3",.75,.05,1,.92),mat("shotLv4",.05,.8,1,.95),mat("shotLv5",1,1,.05,.98)];

// ---- BGM / SE：外部ファイル不要の内蔵Web Audio ----
let audioCtx=null, audioReady=false, bgmOn=true, bgmTimer=null, bgmStep=0, bgmGain=null;
function initAudio(){
 if(audioReady)return;
 const AC=window.AudioContext||window.webkitAudioContext;
 if(!AC)return;
 audioCtx=new AC();
 bgmGain=audioCtx.createGain();
 bgmGain.gain.value=.055;
 bgmGain.connect(audioCtx.destination);
 audioReady=true;
}
function startAudioUnlocked(){
 initAudio();
 if(!audioCtx)return;
 const unlock=()=>{
  try{
   const buf=audioCtx.createBuffer(1,1,audioCtx.sampleRate||44100);
   const src=audioCtx.createBufferSource();
   src.buffer=buf;
   src.connect(audioCtx.destination);
   src.start(0);
  }catch(e){}
  try{
   const osc=audioCtx.createOscillator();
   const gain=audioCtx.createGain();
   gain.gain.value=.00001;
   osc.connect(gain);gain.connect(audioCtx.destination);
   osc.start(0);osc.stop(audioCtx.currentTime+.03);
  }catch(e){}
 };
 unlock();
 const after=()=>{unlock();startBgm();};
 if(audioCtx.state==="suspended")audioCtx.resume().then(after).catch(()=>{setTimeout(startBgm,120)});
 else after();
}
function resumeAudio(){startAudioUnlocked();}
function installIOSAudioUnlock(){
 const targets=[document,canvas,document.getElementById("jump"),document.getElementById("left"),document.getElementById("right"),document.getElementById("hostBtn"),document.getElementById("joinBtn"),document.getElementById("viewerBtn"),document.getElementById("soundToggle"),document.getElementById("soundStart")].filter(Boolean);
 const evs=["touchstart","touchend","pointerdown","mousedown","keydown","click"];
 targets.forEach(t=>evs.forEach(ev=>t.addEventListener(ev,resumeAudio,{passive:true})));
}
function tone(freq,dur=.12,type="square",vol=.16,slide=0){
 if(!audioReady||!audioCtx)return;
 const now=audioCtx.currentTime;
 const osc=audioCtx.createOscillator();
 const gain=audioCtx.createGain();
 osc.type=type;
 osc.frequency.setValueAtTime(freq,now);
 if(slide)osc.frequency.exponentialRampToValueAtTime(Math.max(35,freq+slide),now+dur);
 gain.gain.setValueAtTime(0,now);
 gain.gain.linearRampToValueAtTime(vol,now+.01);
 gain.gain.exponentialRampToValueAtTime(.001,now+dur);
 osc.connect(gain);gain.connect(audioCtx.destination);
 osc.start(now);osc.stop(now+dur+.03);
}
function noise(dur=.18,vol=.12,filterFreq=900){
 if(!audioReady||!audioCtx)return;
 const sr=audioCtx.sampleRate;
 const buf=audioCtx.createBuffer(1,Math.floor(sr*dur),sr);
 const data=buf.getChannelData(0);
 for(let i=0;i<data.length;i++)data[i]=(Math.random()*2-1)*(1-i/data.length);
 const src=audioCtx.createBufferSource();src.buffer=buf;
 const filter=audioCtx.createBiquadFilter();filter.type="bandpass";filter.frequency.value=filterFreq;filter.Q.value=.9;
 const gain=audioCtx.createGain();gain.gain.value=vol;
 src.connect(filter);filter.connect(gain);gain.connect(audioCtx.destination);
 src.start();
}
function chord(freqs,dur=.28,type="triangle",vol=.055){freqs.forEach((f,i)=>setTimeout(()=>tone(f,dur,type,vol,0),i*12));}
const SFX={
 jump(){tone(320,.08,"square",.13,260);tone(520,.07,"square",.08,120)},
 coin(){tone(880,.06,"sine",.12,220);setTimeout(()=>tone(1320,.07,"sine",.1,0),55)},
 hit(){noise(.2,.18,180);tone(120,.18,"sawtooth",.12,-55)},
 miss(){tone(260,.12,"sawtooth",.14,-130);setTimeout(()=>tone(150,.22,"sawtooth",.15,-70),100)},
 respawn(){chord([523,659,784],.22,"triangle",.075);setTimeout(()=>tone(1046,.18,"sine",.09,0),120)},
 attack(){tone(740,.06,"square",.11,-220);noise(.08,.05,1600)},
 shoot(){tone(420,.08,"sawtooth",.07,-90)},
 spring(){tone(300,.08,"square",.14,620);setTimeout(()=>tone(760,.09,"square",.1,-120),55)},
 steam(){noise(.28,.07,1200)},
 item(){chord([660,880,1320],.16,"sine",.075)},
 shield(){chord([392,523,784],.3,"triangle",.06)},
 boss(){tone(90,.24,"sawtooth",.16,0);tone(135,.24,"sawtooth",.12,0)},
 clear(){tone(523,.2,"triangle",.12,0);tone(659,.2,"triangle",.12,.16);tone(784,.34,"triangle",.14,.32)},
 kill(){tone(520,.08,"square",.12,-180);setTimeout(()=>tone(360,.07,"square",.09,0),80)},
 gameover(){tone(392,.18,"triangle",.1,-60);setTimeout(()=>tone(330,.2,"triangle",.1,-60),170);setTimeout(()=>tone(262,.35,"triangle",.11,-80),360)}
};
function startBgm(){
 if(!audioReady||!audioCtx||bgmTimer)return;
 const notes=[196,247,294,330,294,247,220,247,196,247,294,392,370,330,294,247];
 const bass=[98,98,123,123,147,147,123,123];
 bgmTimer=setInterval(()=>{
  if(!bgmOn||!audioCtx||audioCtx.state!=="running")return;
  const lvl=typeof distanceScore==="number"?levelFromX(distanceScore):1;
  const f=notes[bgmStep%notes.length]*(lvl>55?1.122:1);
  const b=bass[Math.floor(bgmStep/2)%bass.length];
  const dur=lvl>75?.105:.135;
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.type= lvl>65?"square":"triangle"; o.frequency.value=f;
  g.gain.value=0; g.gain.linearRampToValueAtTime(.045,audioCtx.currentTime+.01); g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
  o.connect(g); g.connect(bgmGain); o.start(); o.stop(audioCtx.currentTime+dur+.02);
  if(bgmStep%4===0){const bo=audioCtx.createOscillator(), bg=audioCtx.createGain();bo.type="sine";bo.frequency.value=b;bg.gain.value=.06;bo.connect(bg);bg.connect(bgmGain);bg.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.28);bo.start();bo.stop(audioCtx.currentTime+.3)}
  bgmStep++;
 },150);
}
function toggleBgm(){resumeAudio();bgmOn=!bgmOn;document.getElementById("soundToggle").textContent=bgmOn?"♪":"×";}
installIOSAudioUnlock();
const soundStartBtn=document.getElementById("soundStart");
if(soundStartBtn){
 soundStartBtn.addEventListener("touchstart",e=>{e.preventDefault();startAudioUnlocked();},{passive:false});
 soundStartBtn.addEventListener("click",e=>{e.preventDefault();startAudioUnlocked();});
}
['hostBtn','joinBtn','viewerBtn','jump','attack','left','right'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('touchstart',()=>startAudioUnlocked(),{passive:true});});

const STAGE_BASE_SEED=123456789;
let stageSeed=STAGE_BASE_SEED;
function setStageSeed(seed){stageSeed=(Number(seed)||STAGE_BASE_SEED)>>>0;}
function seededRandom(){stageSeed=(1664525*stageSeed+1013904223)>>>0;return stageSeed/4294967296;}

const jumpSurfaces=[];
const stageObjects=[];
const coins=[];
const enemies=[];
const flyingEnemies=[];
const springs=[];
const steamJets=[];
const waterPools=[];
const items=[];
const shopItems=[];
const pendulums=[];
const movingPlatforms=[];
const bosses=[];
const bossBombs=[];
const projectiles=[];
const bossMilestones={33:false,66:false,99:false};
let activeBossRoom=null;
let gameCleared=false;
const netObjects=new Map();
let netObjectSeq=0;
function objectPrefix(kind){return kind+"_";}
function registerNetObject(mesh,kind){
 if(!mesh)return mesh;
 const id=kind+"_"+(netObjectSeq++);
 mesh.metadata=mesh.metadata||{};
 mesh.metadata.netId=id;
 mesh.metadata.netKind=kind;
 netObjects.set(id,mesh);
 return mesh;
}
function getNetId(mesh){return mesh&&mesh.metadata?mesh.metadata.netId:null;}
function removeByNetId(id,notify){
 if(id)tombstoneNetId(id,18000);
 const mesh=netObjects.get(id);
 if(!mesh||mesh.isDisposed())return;
 const kind=mesh.metadata&&mesh.metadata.netKind;
 if(kind==="surface"){const i=jumpSurfaces.indexOf(mesh);if(i>=0)jumpSurfaces.splice(i,1);}
 if(kind==="coin"){const i=coins.indexOf(mesh);if(i>=0)coins.splice(i,1);}
 if(kind==="enemy"){const i=enemies.findIndex(o=>o.mesh===mesh);if(i>=0)enemies.splice(i,1);}
 if(kind==="fly"){const i=flyingEnemies.findIndex(o=>o.mesh===mesh);if(i>=0)flyingEnemies.splice(i,1);}
 if(kind==="item"){const i=items.findIndex(o=>o.mesh===mesh);if(i>=0)items.splice(i,1);}
 if(kind==="shop"){const i=shopItems.findIndex(o=>o.mesh===mesh);if(i>=0){const it=shopItems[i];if(it.label)it.label.remove();shopItems.splice(i,1);}}
 if(kind==="boss"){const i=bosses.findIndex(o=>o.mesh===mesh);if(i>=0)bosses.splice(i,1);}
 if(kind==="shot"){const i=projectiles.findIndex(o=>o.mesh===mesh);if(i>=0)projectiles.splice(i,1);}
 mesh.dispose();
 netObjects.delete(id);
 if(notify)sendNetEvent({type:"remove",oid:id});
}
function removeMeshSynced(mesh){
 const id=getNetId(mesh);
 if(id){
  if(!isHost)suppressNetId(id,3000);
  removeByNetId(id,true);
 }else if(mesh){
  mesh.dispose();
 }
}
function sendNetEvent(data){
 if(isHost){applyNetEvent(data,null);broadcast(data,null);}
 else sendToHost(data);
}
function meshSnapshot(o){
 const m=o.mesh;
 if(!m||m.isDisposed())return null;
 const bi=m.getBoundingInfo();
 const ex=bi.boundingBox.extendSizeWorld;
 const id=getNetId(m);
 let extra={};
 if(o.kind==="item"){const it=items.find(v=>v.mesh===m); if(it)extra.type=it.type;}
 if(o.kind==="shop"){const it=shopItems.find(v=>v.mesh===m); if(it)extra={type:it.type,cost:it.cost,label:it.name,desc:it.desc||""};}
 if(o.kind==="enemy"){const e=enemies.find(v=>v.mesh===m); if(e)extra={dir:e.dir,homeX:e.homeX,range:e.range};}
 if(o.kind==="fly"){const f=flyingEnemies.find(v=>v.mesh===m); if(f)extra={homeX:f.homeX,homeY:f.homeY,phase:f.phase,ampX:f.ampX,ampY:f.ampY,speed:f.speed};}
 if(o.kind==="boss"){const b=bosses.find(v=>v.mesh===m); if(b)extra={hp:b.hp,maxHp:b.maxHp||b.hp,dir:b.dir,homeX:b.homeX,homeY:b.homeY??m.position.y,range:b.range,lvl:b.lvl,bossRoom:!!b.bossRoom,lastBomb:b.lastBomb||0,scale:m.scaling.x||1};}
 if(o.kind==="shot"){const sh=projectiles.find(v=>v.mesh===m); if(sh)extra={vx:sh.vx,vy:sh.vy,owner:sh.owner||"player",size:sh.size||1,laser:!!sh.laser};}
 if(o.kind==="bomb"){const bo=bossBombs.find(v=>v.mesh===m); if(bo)extra={lit:bo.lit,fuseAt:bo.fuseAt,vx:bo.vx,vy:bo.vy,owner:bo.owner};}
 if(o.kind==="spring"){extra={pulse:(springs.find(v=>v.mesh===m)||{}).pulse||0};}
 if(o.kind==="steam"){const st=steamJets.find(v=>v.mesh===m); if(st)extra={baseY:st.baseY,h:st.h,phase:st.phase};}
 if(o.kind==="water"){const wp=waterPools.find(v=>v.mesh===m); if(wp)extra={w:wp.w};}
 if(o.kind==="surface"){const mp=movingPlatforms.find(v=>v.mesh===m); if(mp)extra={moving:true,baseX:mp.baseX,baseY:mp.baseY,amp:mp.amp,speed:mp.speed,phase:mp.phase,lastX:mp.lastX,lastY:mp.lastY};}
 return {id,kind:o.kind,name:m.name,x:m.position.x,y:m.position.y,z:m.position.z,rx:m.rotation.x,ry:m.rotation.y,rz:m.rotation.z,sx:m.scaling.x,sy:m.scaling.y,sz:m.scaling.z,w:ex.x*2,h:ex.y*2,d:ex.z*2,extra};
}
function snapshotWorld(){
 return {
  type:"world",
  authoritative:true,
  seed:STAGE_BASE_SEED,
  gen:generatedUntil,
  hostX:playerCollider?playerCollider.position.x:-12,
  hostY:playerCollider?playerCollider.position.y:2,
  hostDead:(typeof isPlayerDown==="function")?isPlayerDown():false,
  objects:stageObjects.map(meshSnapshot).filter(Boolean)
 };
}
function recreateNetObject(o){
 if(!o||!o.id)return null;
 let mesh=null,rec=null;
 const x=o.x||0,y=o.y||0,z=o.z||0,w=o.w||1,h=o.h||1,d=o.d||5;
 if(o.kind==="surface"){
  mesh=registerJumpSurface(staticBox(o.name||"surface",x,y,z,Math.max(.1,w),Math.max(.1,h),Math.max(.1,d),mGround));
  if(o.extra&&o.extra.moving)movingPlatforms.push({mesh,baseX:o.extra.baseX??x,baseY:o.extra.baseY??y,amp:o.extra.amp||2,speed:o.extra.speed||.001,phase:o.extra.phase||0,lastX:o.extra.lastX??x,lastY:o.extra.lastY??y});
 }else if(o.kind==="coin"){
  mesh=BABYLON.MeshBuilder.CreateTorus("coin",{diameter:.8,thickness:.11,tessellation:24},scene);mesh.rotation.x=Math.PI/2;mesh.material=mCoin;coins.push(mesh);
 }else if(o.kind==="enemy"){
  mesh=BABYLON.MeshBuilder.CreateSphere("enemy",{diameter:.85,segments:16},scene);mesh.material=mEnemy;mesh.physicsImpostor=new BABYLON.PhysicsImpostor(mesh,BABYLON.PhysicsImpostor.SphereImpostor,{mass:1,friction:.7,restitution:.2},scene);enemies.push({mesh,dir:o.extra?.dir||1,homeX:o.extra?.homeX??x,range:o.extra?.range||2.5});
 }else if(o.kind==="fly"){
  mesh=BABYLON.MeshBuilder.CreateSphere("fly",{diameter:.9,segments:16},scene);mesh.scaling.x=1.45;mesh.material=mSky;flyingEnemies.push({mesh,homeX:o.extra?.homeX??x,homeY:o.extra?.homeY??y,phase:o.extra?.phase||0,ampX:o.extra?.ampX||2,ampY:o.extra?.ampY||1,speed:o.extra?.speed||.0015});
 }else if(o.kind==="spring"){
  mesh=BABYLON.MeshBuilder.CreateCylinder("spring",{diameter:.9,height:.35,tessellation:18},scene);mesh.material=mSpring;springs.push({mesh,pulse:o.extra?.pulse||0});
 }else if(o.kind==="steam"){
  mesh=BABYLON.MeshBuilder.CreateCylinder("steam",{diameter:.85,height:Math.max(.3,h),tessellation:16},scene);mesh.material=mSteam;steamJets.push({mesh,baseY:o.extra?.baseY??(y-h/2),h:o.extra?.h||h,phase:o.extra?.phase||0});
 }else if(o.kind==="water"){
  mesh=staticBox("waterPool",x,y,z,Math.max(.1,w),Math.max(.1,h),Math.max(.1,d),mWater); if(mesh.physicsImpostor)mesh.physicsImpostor.dispose(); waterPools.push({mesh,w:o.extra?.w||w});
 }else if(o.kind==="item"){
  mesh=BABYLON.MeshBuilder.CreateBox("item_"+(o.extra?.type||"item"),{width:.7,height:.7,depth:.7},scene);mesh.material=(o.extra?.type)==="para"?mParachute:mItem;items.push({mesh,type:o.extra?.type||"item",phase:0});

function syncNetObject(o){

 if(!w.objects){return;}
 const firstWorld=!worldReady;
 worldReady=true;
 generatedUntil=w.gen||generatedUntil;
 const alive=new Set(w.objects.map(o=>o.id));
 Array.from(netObjects.keys()).forEach(id=>{if(!alive.has(id))removeByNetId(id,false);});
 // ホスト位置はworldスナップショットからも強制更新して、クライアント側の頭踏み判定のズレを防ぐ
 if(typeof w.hostX==="number"&&typeof w.hostY==="number"){
  const hp=makeRemote("HOST","HOST");
  hp.dead=!!w.hostDead;
  hp.root.setEnabled(!hp.dead);
  if(!hp.dead)hp.root.position.set(w.hostX,w.hostY,0);

 }
 w.objects.forEach(o=>{

 });
 if(firstWorld&&!isViewer&&!joinRespawnDone){

function applyNetEvent(data,fromConn){
 if(!data||typeof data!=="object")return;
 if(data.type==="remove"){
  removeByNetId(data.oid,false);
  if(isHost){broadcast({type:"remove",oid:data.oid},fromConn);broadcast(snapshotWorld(),null);}
  return;
 }
 if(data.type==="bossDamage"){
  const b=findBossByNetId(data.bossId);
  if(data.shotId)removeByNetId(data.shotId,false);
  if(isHost&&b){damageBossSynced(b,Number(data.dmg)||1);broadcast({type:"bossDamage",bossId:data.bossId,shotId:data.shotId,dmg:Number(data.dmg)||1},fromConn);broadcast(snapshotWorld(),null);}
  else if(!isHost&&b){damageBossSynced(b,Number(data.dmg)||1);}
  return;
 }
 if(data.type==="bombLight"){
  const bo=findBombByNetId(data.bombId);
  if(bo){bo.lit=true;bo.fuseAt=data.fuseAt||performance.now()+1800;bo.vx=data.vx||bo.vx||0;bo.vy=data.vy||bo.vy||0;if(bo.mesh)bo.mesh.material=mFuse;}
  if(isHost){broadcast({type:"bombLight",bombId:data.bombId,fuseAt:bo?bo.fuseAt:data.fuseAt,vx:data.vx||0,vy:data.vy||0},fromConn);broadcast(snapshotWorld(),null);}
  return;
 }
 if(data.type==="bombKick"){
  const bo=findBombByNetId(data.bombId);
  if(bo){bo.lit=true;bo.fuseAt=bo.fuseAt||performance.now()+1600;bo.vx=data.vx||0;bo.vy=data.vy||0;if(bo.mesh&&bo.mesh.physicsImpostor)bo.mesh.physicsImpostor.setLinearVelocity(new BABYLON.Vector3(bo.vx,bo.vy,0));if(bo.mesh)bo.mesh.material=mFuse;}
  if(isHost){broadcast({type:"bombKick",bombId:data.bombId,vx:data.vx||0,vy:data.vy||0},fromConn);broadcast(snapshotWorld(),null);}
  return;
 }
 if(data.type==="bombExplode"){
  const bo=findBombByNetId(data.bombId);
  if(isHost&&bo){explodeBossBomb(bo,true);broadcast({type:"bombExplode",bombId:data.bombId,x:data.x,y:data.y},fromConn);broadcast(snapshotWorld(),null);}
  else if(!isHost&&bo){explodeBossBomb(bo,true);}
  return;
 }
 if(data.type==="attackReq"&&isHost){
  let spawned=null;
  if(data.laser)spawned=fireLaser(data.x,data.y,data.dir||1,data.id||"net",data.size||.22);
  else spawned=fireProjectile(data.x,data.y,data.dir||1,data.id||"player",data.size||1);
  const oid=spawned?getNetId(spawned):null;
  broadcast({type:"attackSpawn",oid,x:data.x,y:data.y,dir:data.dir||1,size:data.size||1,laser:!!data.laser,from:data.id||"guest"},fromConn);
  broadcast(snapshotWorld(),null);return;
}
if(data.type==="attackSpawn"&&!isHost){
 if(data.from&&data.from===myNetId)return;
 fireLocalProjectile(data.x,data.y,data.dir||1,data.size||1,!!data.laser,true);return;
}
 if(data.type==="shopBuy"&&isHost){broadcast(data,fromConn);return;}
 if(isHost&&data.type==="remove")broadcast(data,fromConn);
}

function rand(a,b){return a+seededRandom()*(b-a)}
function generateChunk(untilX){
 while(generatedUntil<untilX){
  const nextLevel=levelFromX(generatedUntil);
  if(nextLevel>=33&&!bossMilestones[33]){spawnBossRoom(33);continue;}
  if(nextLevel>=66&&!bossMilestones[66]){spawnBossRoom(66);continue;}
  if(nextLevel>=99&&!bossMilestones[99]){spawnBossRoom(99);continue;}
  const start=generatedUntil;
  const level=levelFromX(start);
  const d=difficultyFromX(start);
  const gap=rand(1.5+d*2.5,2.7+d*5.8);
  const width=Math.max(1.45,rand(7.8-d*5.5,9.0-d*4.2));
  const x=start+gap+width/2;
  let y=lastPlatformY+rand(-.55-d*1.7,.75+d*2.1);
  y=Math.max(-.35,Math.min(6.6,y));
  const useGround=y<.18&&seededRandom()<(.55-d*.45);
  const kind=seededRandom();
  let p;
  if(level>10&&kind<.14+d*.12)p=movingPlatform(x,useGround?-.25:y,width,1.3+d*3.2,.001+d*.002);
  else if(level>18&&kind<.24+d*.10)p=ramp(x,useGround?-.25:y,width,seededRandom()<.5?.20+d*.25:-.20-d*.25);
  else p=platform("plat"+Math.floor(start),x,useGround?-.25:y,width,useGround?mGround:mBrick);
  const top=(useGround?-.25:y)+.25;

  const coinCount=1+Math.floor(seededRandom()*(2+d*6));
  for(let i=0;i<coinCount;i++){
   const riskY=top+1.15+seededRandom()*(.65+d*2.0);
   coin(x-width*.36+i*(width*.72/Math.max(1,coinCount-1)),riskY);
  }

  if(level>6&&seededRandom()<.10+d*.36)spring(x+rand(-width*.32,width*.32),top+.33);
  if(level>12&&seededRandom()<.08+d*.34)steamJet(x+rand(-width*.35,width*.35),top+.1,2.0+d*3.8);
  if(level>16&&seededRandom()<.06+d*.22)waterPool(x+rand(-width*.22,width*.22),top+.05,Math.max(1.4,width*.45));
  if(level>20&&seededRandom()<.10+d*.25)pendulum(x+rand(-width*.35,width*.35),top+3.6+d*1.8,2.4+d*1.6);
  if(level>24&&seededRandom()<.08+d*.22)seesaw(x,top+.55);

  if(start>12&&seededRandom()<(.18+d*.70))enemy(x,top+.8);
  if(level>22&&seededRandom()<(.10+d*.52))flyingEnemy(x+rand(-width*.4,width*.4),top+2.2+seededRandom()*2.2);
  if(level>48&&seededRandom()<d*.25)enemy(x+rand(-width*.3,width*.3),top+.8);

  if(seededRandom()<(.10+d*.36)){
   const hiX=x+rand(-width*.28,width*.28);
   const hiY=top+rand(1.7+d*.35,2.6+d*1.7);
   const hiW=Math.max(1.4,rand(3.8-d*2.2,4.8-d*1.8));
   if(level>34&&seededRandom()<.35)movingPlatform(hiX,hiY,hiW,1+d*2.2,.0012+d*.002);
   else platform("high"+Math.floor(start),hiX,hiY,hiW,mBrick);
   coin(hiX,hiY+1.1+d*.9);
  }
  if(level>=30&&seededRandom()<.16+d*.22){
   const tinyX=x+width/2+rand(1.1,2.4+d*2.4);
   const tinyY=top+rand(-.3,.8+d*.9);
   platform("tiny"+Math.floor(start),tinyX,tinyY,Math.max(1.1,rand(1.3,2.5-d*.6)),mBrick);
  }
  if(level>8&&seededRandom()<.10+d*.20){
   const types=["shield","attack","para","magnet"];
   item(x+rand(-width*.25,width*.25),top+1.55+d*.6,types[Math.floor(seededRandom()*types.length)]);
  }
  if(level>5&&seededRandom()<.16+d*.12){
   const shops=["jump","double","speed","bigshot","extend","laser","attack"];
   shopItem(x+rand(-width*.33,width*.33),top+1.85+d*.45,shops[Math.floor(seededRandom()*shops.length)]);
  }
  /* milestone boss only */
  lastPlatformY=useGround?0:y;
  generatedUntil=x+width/2;
 }
}
function cleanupBehind(minX){
 for(let i=stageObjects.length-1;i>=0;i--){
  const o=stageObjects[i],m=o.mesh;
  if(!m||m.isDisposed()) {stageObjects.splice(i,1);continue;}
  if(m.position.x<minX){
   if(o.kind==="surface"){
    const si=jumpSurfaces.indexOf(m); if(si>=0)jumpSurfaces.splice(si,1);
   }
   if(o.kind==="coin"){
    const ci=coins.indexOf(m); if(ci>=0)coins.splice(ci,1);
   }
   if(o.kind==="shop"){
    const si=shopItems.findIndex(v=>v.mesh===m); if(si>=0){if(shopItems[si].label)shopItems[si].label.remove();shopItems.splice(si,1);}
   }
   if(o.kind==="enemy"){
    const ei=enemies.findIndex(e=>e.mesh===m); if(ei>=0)enemies.splice(ei,1);
   }
   if(o.kind==="fly"){const i=flyingEnemies.findIndex(e=>e.mesh===m); if(i>=0)flyingEnemies.splice(i,1);}
   if(o.kind==="spring"){const i=springs.findIndex(e=>e.mesh===m); if(i>=0)springs.splice(i,1);}
   if(o.kind==="steam"){const i=steamJets.findIndex(e=>e.mesh===m); if(i>=0)steamJets.splice(i,1);}
   if(o.kind==="water"){const i=waterPools.findIndex(e=>e.mesh===m); if(i>=0)waterPools.splice(i,1);}
   if(o.kind==="item"){const i=items.findIndex(e=>e.mesh===m); if(i>=0)items.splice(i,1);}
   if(o.kind==="boss"){const i=bosses.findIndex(e=>e.mesh===m); if(i>=0)bosses.splice(i,1);}
   if(o.kind==="shot"){const i=projectiles.findIndex(e=>e.mesh===m); if(i>=0)projectiles.splice(i,1);}
   m.dispose(); stageObjects.splice(i,1);
  }
 }
}

const PLAYER_HALF_HEIGHT=1.075;
function getSurfaceUnderPlayer(){
 const footY=playerCollider.position.y-PLAYER_HALF_HEIGHT;
 let best=null;
 for(const s of jumpSurfaces){
  if(!s||s.isDisposed())continue;
  const sx=s.position.x, sy=s.position.y, sz=s.position.z;
  const box=s.getBoundingInfo().boundingBox;
  const w=box.extendSizeWorld.x;
  const h=box.extendSizeWorld.y;
  const d=box.extendSizeWorld.z;
  const topY=sy+h;
  const onX=Math.abs(playerCollider.position.x-sx)<=w+.42;
  const onZ=Math.abs(playerCollider.position.z-sz)<=d+.27;
  const aboveTop=playerCollider.position.y>topY+.35;
  const nearFeet=footY<=topY+.22&&footY>=topY-.70;
  if(onX&&onZ&&aboveTop&&nearFeet){
   if(!best||topY>best.topY)best={topY};
  }
 }
 return best;
}
function stabilizePlayerOnSurface(){
 const v=playerCollider.physicsImpostor.getLinearVelocity();
 const surface=getSurfaceUnderPlayer();
 if(!surface||v.y>1.0)return false;
 const targetY=surface.topY+PLAYER_HALF_HEIGHT+.02;
 if(playerCollider.position.y<targetY){
  playerCollider.position.y=targetY;
  playerCollider.physicsImpostor.setLinearVelocity(new BABYLON.Vector3(v.x,0,0));
 }
 return Math.abs((playerCollider.position.y-PLAYER_HALF_HEIGHT)-surface.topY)<=.26;
}
function isPlayerGrounded(){

 return !!getSurfaceUnderPlayer();
}

  playerCollider.position.y=Math.max(playerCollider.position.y,hit.root.position.y+2.05);
  playerCollider.physicsImpostor.setLinearVelocity(new BABYLON.Vector3(v.x,11.2,0));

 }

}

function suppressNetId(id,ms=18000){if(id){locallySuppressedNetIds.set(id,performance.now()+ms);tombstoneNetId(id,ms);}}
function isNetIdSuppressed(id){const until=locallySuppressedNetIds.get(id);if(!until)return false;if(performance.now()>until){locallySuppressedNetIds.delete(id);return false;}return true;}

async function setupCamera(){

 if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){setNetStatus("カメラ非対応 / 映像なしで同期");return null;}
 try{
  localCamStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user",width:{ideal:120},height:{ideal:90}},audio:false});
  localCamVideo=document.createElement("video");
  localCamVideo.autoplay=true;localCamVideo.muted=true;localCamVideo.playsInline=true;localCamVideo.srcObject=localCamStream;localCamVideo.play().catch(()=>{});
  camCanvas=document.createElement("canvas");camCanvas.width=160;camCanvas.height=240;camCtx=camCanvas.getContext("2d");
  attachLocalCameraToPlayer(localCamStream);
  return localCamStream;
 }catch(e){setNetStatus("カメラ許可なし / 映像なしで同期");return null;}
}
function applyCameraFrame(id,img){
 if(!id||!img||id===myNetId)return;
 const rp=makeRemote(id,id==="HOST"?"HOST":"GUEST");
 if(!rp.face)return;
 try{
  if(rp.camTex)rp.camTex.dispose();
  rp.camTex=new BABYLON.Texture(img,scene,true,false);
  rp.camTex.vScale=-1;rp.camTex.vOffset=1;
  if(!rp.camMat){rp.camMat=new BABYLON.StandardMaterial("camMat_"+id,scene);rp.camMat.backFaceCulling=false;rp.face.material=rp.camMat;}
  rp.camMat.diffuseTexture=rp.camTex;rp.camMat.emissiveTexture=rp.camTex;rp.face.setEnabled(true);
 }catch(e){}
}
function captureCameraFrame(){
 if(!localCamVideo||!camCtx||localCamVideo.readyState<2)return null;
 try{
  const cw=camCanvas.width,ch=camCanvas.height;
  const vw=localCamVideo.videoWidth||160,vh=localCamVideo.videoHeight||120;
  const scale=Math.max(cw/vw,ch/vh);
  const sw=cw/scale,sh=ch/scale;
  const sx=(vw-sw)/2,sy=(vh-sh)/2;
  camCtx.clearRect(0,0,cw,ch);
  camCtx.drawImage(localCamVideo,sx,sy,sw,sh,0,0,cw,ch);
  return camCanvas.toDataURL("image/jpeg",.42);
 }catch(e){return null;}
}

function sendToHost(data){if(hostConn&&hostConn.open)hostConn.send(data)}
function broadcast(data,except){conns.forEach(c=>{if(c!==except&&c.open)c.send(data)})}
function handleClientData(conn,data){
 if(!data||typeof data!=="object")return;
 if(data.type==="viewer"){conn.isViewer=true;return;}
 if(data.type==="remove"){applyNetEvent(data,conn);return;}
 if(data.type==="attackReq"){applyNetEvent(data,conn);return;}
 if(data.type==="cam"){applyCameraFrame(data.id,data.img);broadcast(data,conn);return;}
 if(data.type==="state"){
  notePeerMapping(data.pid,data.id);
  const payload={type:"remote",id:data.id,pid:data.pid,x:data.x,y:data.y,z:data.z,vx:data.vx,score:data.score,dist:data.dist,dead:!!data.dead};
  broadcast(payload,conn);
  const rp=makeRemote(data.id,"GUEST");rp.dead=!!data.dead;rp.root.setEnabled(!rp.dead);if(!rp.dead)rp.root.position.set(data.x,data.y,data.z||0);rp.last=performance.now();checkAllDown();
 }
}
function handleHostData(data){
 if(!data||typeof data!=="object")return;
 if(data.type==="world"){applyWorldSnapshot(data);return;}
 if(data.type==="remove"){applyNetEvent(data,null);return;}
 if(data.type==="cam"){applyCameraFrame(data.id,data.img);return;}
 if(data.type==="peerList"){return;}
 if(data.type==="remote"&&data.id!==myNetId){
  notePeerMapping(data.pid,data.id);
  const rp=makeRemote(data.id,data.id==="HOST"?"HOST":"GUEST");rp.dead=!!data.dead;rp.root.setEnabled(!rp.dead);if(!rp.dead)rp.root.position.set(data.x,data.y,data.z||0);rp.last=performance.now();checkAllDown();
 }
 if(data.type==="hostState"){
  notePeerMapping(data.pid,"HOST");
  const rp=makeRemote("HOST","HOST");rp.dead=!!data.dead;rp.root.setEnabled(!rp.dead);if(!rp.dead)rp.root.position.set(data.x,data.y,data.z||0);rp.last=performance.now();checkAllDown();
 }
}

    const speed=(.55+o.lvl/150);
    b.position.x+=o.dir*speed/60;
    if(b.position.x<o.homeX-o.range||b.position.x>o.homeX+o.range)o.dir*=-1;
    b.position.y=o.homeY+Math.sin(t)*.42;
    b.position.z=0;
    if(now-o.lastShot>Math.max(900,2300-o.lvl*16)){fireProjectile(b.position.x,b.position.y+.35,o.dir,"boss");o.lastShot=now;}
    if(!o.lastBomb)o.lastBomb=0;
    if(o.bossRoom&&now-o.lastBomb>Math.max(1200,3000-o.lvl*18)){spawnBossBomb(b.position.x-o.dir*(1.7*scale),b.position.y-(1.05*scale));o.lastBomb=now;}
   }
   if(now>invincibleUntil&&isBodyHit(b,1.05*scale,1.20*scale)){
    if(playerCollider.position.y>b.position.y+(.78*scale)&&v.y<0){
     damageBossSynced(o,1);
     if(!isHost&&isMultiplayerActive())sendToHost({type:"bossDamage",bossId:getNetId(b),dmg:1});
     playerCollider.physicsImpostor.setLinearVelocity(new BABYLON.Vector3(v.x,6.2,0));
    }
    else if(now<shieldUntil){SFX.shield();shieldUntil=0;playerCollider.physicsImpostor.setLinearVelocity(new BABYLON.Vector3(-o.dir*4,5,0));}
    else playerMiss();
   }
  });
  projectiles.slice().forEach(o=>{
   o.mesh.position.x+=o.vx/60;o.mesh.position.y+=o.vy/60;o.vy-=.045;
   if(now-o.born>5500){removeMeshSynced(o.mesh);return;}
   bosses.slice().forEach(b=>{
    if(o.owner!=="boss"&&BABYLON.Vector3.Distance(o.mesh.position,b.mesh.position)<((o.size||1)*.42+1.0+(b.mesh.scaling.x||1)*1.05)&&o.born+80<now){
     const dmg=o.laser?Math.max(2,ownedAttackDamage()+1):ownedAttackDamage();
     const bossId=getNetId(b.mesh),shotId=getNetId(o.mesh);
     damageBossSynced(b,dmg);
     removeMeshSynced(o.mesh);
     if(!isHost&&isMultiplayerActive())sendToHost({type:"bossDamage",bossId,shotId,dmg});
    }
   });
   enemies.slice().forEach(en=>{if(BABYLON.Vector3.Distance(o.mesh.position,en.mesh.position)<(.55+(o.size||1)*.35)){removeMeshSynced(en.mesh);removeMeshSynced(o.mesh);coinScore+=2;SFX.kill();}});
   flyingEnemies.slice().forEach(en=>{if(BABYLON.Vector3.Distance(o.mesh.position,en.mesh.position)<(.55+(o.size||1)*.35)){removeMeshSynced(en.mesh);removeMeshSynced(o.mesh);coinScore+=3;SFX.kill();}});
   if(o.owner==="boss"&&now>invincibleUntil&&isBodyHit(o.mesh,.34,.55)){if(now<shieldUntil){SFX.shield();shieldUntil=0;removeMeshSynced(o.mesh);}else playerMiss();}
  });

  enemies.slice().forEach(o=>{
   const e=o.mesh;
   if(!e||e.isDisposed())return;
   const ev=e.physicsImpostor.getLinearVelocity();
   e.physicsImpostor.setLinearVelocity(new BABYLON.Vector3(o.dir*(1.35+Math.min(.9,distanceScore/160)),ev.y,0));
   if(e.position.x<o.homeX-o.range||e.position.x>o.homeX+o.range)o.dir*=-1;
   if(performance.now()>invincibleUntil&&Math.abs(e.position.x-playerCollider.position.x)<.78&&Math.abs(e.position.y-playerCollider.position.y)<1.05){
    if(playerCollider.position.y>e.position.y+.55&&v.y<0){
     SFX.kill();
     removeMeshSynced(e);
     playerCollider.physicsImpostor.setLinearVelocity(new BABYLON.Vector3(v.x,5.2,0));
    }else{if(performance.now()<shieldUntil){SFX.shield();shieldUntil=0;playerCollider.physicsImpostor.setLinearVelocity(new BABYLON.Vector3(-o.dir*4,5,0));}else playerMiss();}
   }
  });

  updateUI();
  if(levelFromX(distanceScore)>=100&&!bosses.some(b=>b.mesh&&!b.mesh.isDisposed()))gameClear();
  // Camera policy:
  // - World authority / leash remains host-based.
  // - Play camera is always local-player based for playable clients.
  // - Viewer mode above still follows HOST.
  const camX=playerCollider.position.x;
  const camY=playerCollider.position.y;
  camera.position.x=camX;
  camera.position.y=camY+2.6;
  camera.position.z=-10;
  camera.setTarget(new BABYLON.Vector3(camX,camY+1.0,0));
 }
 remotePlayers.forEach(updateRemoteTag);shopItems.forEach(updateShopLabel);
 scene.render();
});
window.addEventListener("resize",()=>engine.resize());
</script>
