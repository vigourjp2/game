// ===== WebRTC LOW-LAG PATCH START =====
let rtcPeer=null;
let rtcChannel=null;
let rtcReady=false;
let rtcLastStateAt=0;
let rtcLastJoinAt=0;

function rtcSend(obj){
  if(!rtcChannel || rtcChannel.readyState!=='open') return false;
  try{
    rtcChannel.send(JSON.stringify(obj));
    return true;
  }catch(e){
    return false;
  }
}

function initWebRTC(){
  if(rtcPeer) return;
  rtcPeer=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
  rtcPeer.onicecandidate=async e=>{
    if(!e.candidate || !roomRef) return;
    const path=isHost?'rtc_hostCandidates':'rtc_joinCandidates';
    try{await roomRef.child(path).push(e.candidate.toJSON())}catch(err){}
  };
  rtcPeer.ondatachannel=e=>setupRTCChannel(e.channel);
}

function setupRTCChannel(ch){
  rtcChannel=ch;
  rtcChannel.binaryType='arraybuffer';
  rtcChannel.onopen=()=>{
    rtcReady=true;
    setMsg('WebRTC直結完了。ゲーム中の同期はFirebaseではなく端末間直結。');
  };
  rtcChannel.onclose=()=>{
    rtcReady=false;
    setMsg('WebRTC切断。Firebase同期へフォールバック。');
  };
  rtcChannel.onerror=()=>{rtcReady=false};
  rtcChannel.onmessage=e=>{
    let m;
    try{m=JSON.parse(e.data)}catch(err){return}
    if(isHost && m.type==='joinInput'){
      opp.tx=Number(m.tx);
      opp.ty=Number(m.ty);
      if(Number.isFinite(Number(m.x))) opp.x=Number(m.x);
      if(Number.isFinite(Number(m.y))) opp.y=Number(m.y);
      opp.online=true;
      return;
    }
    if(!isHost && m.type==='state'){
      lastRemotePuck=m.puck;
      score=m.score||score;
      if(m.host){
        opp.tx=Number(m.host.x);
        opp.ty=Number(m.host.y);
      }
      return;
    }
  };
}

async function startWebRTCHost(){
  initWebRTC();
  rtcChannel=rtcPeer.createDataChannel('game',{ordered:false,maxRetransmits:0});
  setupRTCChannel(rtcChannel);
  const offer=await rtcPeer.createOffer();
  await rtcPeer.setLocalDescription(offer);
  await roomRef.child('rtc_offer').set({type:offer.type,sdp:offer.sdp});
  roomRef.child('rtc_answer').on('value',async snap=>{
    const v=snap.val();
    if(v && !rtcPeer.currentRemoteDescription){
      try{await rtcPeer.setRemoteDescription(new RTCSessionDescription(v))}catch(e){}
    }
  });
  roomRef.child('rtc_joinCandidates').on('child_added',snap=>{
    try{rtcPeer.addIceCandidate(new RTCIceCandidate(snap.val()))}catch(e){}
  });
}

async function startWebRTCJoin(){
  initWebRTC();
  const offerSnap=await roomRef.child('rtc_offer').get();
  if(!offerSnap.exists()){
    setMsg('WebRTC offer待ち。HOST作成後にJOINを押し直してください。');
    return;
  }
  await rtcPeer.setRemoteDescription(new RTCSessionDescription(offerSnap.val()));
  const answer=await rtcPeer.createAnswer();
  await rtcPeer.setLocalDescription(answer);
  await roomRef.child('rtc_answer').set({type:answer.type,sdp:answer.sdp});
  roomRef.child('rtc_hostCandidates').on('child_added',snap=>{
    try{rtcPeer.addIceCandidate(new RTCIceCandidate(snap.val()))}catch(e){}
  });
}
// ===== WebRTC LOW-LAG PATCH END =====

function initFirebase(){if(db)return true;if(!window.firebase||!firebase.database){setMsg('Firebaseを読み込めない。GitHub Pages等のhttps配置で再読込。');return false}if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);db=firebase.database();return true}

await playersRef.child(role).set({id:playerId,name,role,x:me.x,y:me.y,tx:me.tx,ty:me.ty,updatedAt:firebase.database.ServerValue.TIMESTAMP});playersRef.child(role).onDisconnect().remove();connected=true;started=true;panel.classList.add('hidden');resetPlayers();if(isHost){resetPuck(-1);await startWebRTCHost()}else{await startWebRTCJoin()}attachListeners();setMsg((role==='p1'?'下側P1':'上側P2')+'で参加。指で押さえ込むとパックが止まる。');}catch(e){console.error(e);setMsg('接続失敗。Firebase設定・Databaseルール・通信を確認。')}}
function attachListeners(){playersRef.on('value',snap=>{const p=snap.val()||{};const myRole=role,opRole=myRole==='p1'?'p2':'p1';const po=p[opRole];opp.online=!!po;if(po){opp.name=po.name||'相手';opp.tx=Number(po.tx??po.x??opp.tx);opp.ty=Number(po.ty??po.y??opp.ty);sideNames[opRole]=opp.name}const pm=p[myRole];if(pm)sideNames[myRole]=pm.name||name;});stateRef.on('value',snap=>{const s=snap.val();if(!s)return;score=s.score||score;if(!isHost&&s.puck&&!rtcReady){lastRemotePuck=s.puck;puck.x=Number(s.puck.x);puck.y=Number(s.puck.y);puck.vx=Number(s.puck.vx);puck.vy=Number(s.puck.vy)}lastState=now();});}

function setTargetFromPointer(e){if(!started)return;const p=e.touches?e.touches[0]:e;const q=inv(p.clientX,p.clientY);const half=world.h/2;let y=q.y;if(role==='p1')y=clamp(y,half+world.paddleR,world.h-world.paddleR-18);else y=clamp(y,world.paddleR+18,half-world.paddleR);me.tx=clamp(q.x,world.paddleR+10,world.w-world.paddleR-10);me.ty=y;localTouch=true;}
canvas.addEventListener('touchstart',e=>{e.preventDefault();setTargetFromPointer(e)},{passive:false});canvas.addEventListener('touchmove',e=>{e.preventDefault();setTargetFromPointer(e)},{passive:false});canvas.addEventListener('touchend',e=>{e.preventDefault();localTouch=false},{passive:false});canvas.addEventListener('pointerdown',e=>{e.preventDefault();setTargetFromPointer(e)});canvas.addEventListener('pointermove',e=>{if(e.buttons||e.pointerType==='touch')setTargetFromPointer(e)});canvas.addEventListener('pointerup',()=>{localTouch=false});

// WebRTC時は最新値へ追いかけるのではなく、少し過去を時間補間して描画する。
// これでAndroid/回線揺れの微カクをかなり消す。
let rp=null;

if(rtcReady && rtcStateBuffer.length>=2){
  const targetTime=performance.now()-RTC_INTERP_DELAY;

  let a=null,b=null;
  for(let i=0;i<rtcStateBuffer.length-1;i++){
    if(rtcStateBuffer[i].recvAt<=targetTime && rtcStateBuffer[i+1].recvAt>=targetTime){
      a=rtcStateBuffer[i];
      b=rtcStateBuffer[i+1];
      break;
    }
  }

  if(!a || !b){
    a=rtcStateBuffer[Math.max(0,rtcStateBuffer.length-2)];
    b=rtcStateBuffer[rtcStateBuffer.length-1];
  }

  const span=Math.max(1,b.recvAt-a.recvAt);

  puck.y=world.h/2;
}else{
  const rvx=Number(rp.vx||0);
  const rvy=Number(rp.vy||0);

  // 速度で少しだけ先読み。ワープではなく滑らかに寄せる。
  const predictX=Number(rp.x)+rvx*.85;
  const predictY=Number(rp.y)+rvy*.85;

  puck.x+=puck.vx*.72;
  puck.y+=puck.vy*.72;

  const err=Math.hypot(predictX-puck.x,predictY-puck.y);

  if(err>95){

    puck.x=predictX;
    puck.y=predictY;
  }else{
    const k=err<3 ? 0 : .30;
    puck.x+=(predictX-puck.x)*k;
    puck.y+=(predictY-puck.y)*k;
  }

  puck.vy+=(rvy-puck.vy)*.36;
