 const y=lv*stepH;

 // 内部の間仕切り。巨大な家の中を横だけでなく上下にも迷わせる。

  if(r()<.5){const x=ri(r,-half+6,half-6);for(let z=-half+1;z<=half-1;z++)for(let yy=y+1;yy<=y+3;yy++)put(x,yy,z,wallType);carveDoor(x,ri(r,-half+4,half-4),y,2,2,'x')}

 }

 // 家具や柱

}
// 階段だけではなく、落とし穴的な吹き抜けも少し作る。
for(let n=0;n<2+Math.floor(floor/20);n++){
 const x=ri(r,-half+6,half-6),z=ri(r,-half+6,half-6),lv=ri(r,1,levels-1),y=lv*stepH;

for(let i=0;i<14+Math.floor(floor/7);i++){const ro=choice(r,insideRooms),gold=r()<.30;items.push({id:'it'+i,key:gold?'gold':choice(r,keys),x:ro.cx+ri(r,-3,3),y:ro.h+1.35,z:ro.cz+ri(r,-3,3),gold:gold?ri(r,10,70+floor*3):0})}

function renderMenu(){menuInfo.innerHTML=`HP ${player.hp}/${player.maxHp} / ${player.gold}G / ${player.floor}F<br>装備: ${player.weapon?.name||'武器なし'} / ${player.shield?.name||'盾なし'} / ${player.accessory?.name||'アクセなし'}`;menuGrid.innerHTML='';if(!player.inventory.length){menuGrid.innerHTML='<div class="itemCard">アイテムなし。敵を倒すか拾え。</div>';return}player.inventory.forEach((it,idx)=>{const def=itemMaster[it.key],card=document.createElement('div');card.className='itemCard';card.innerHTML=`<b>${def.name}</b><br>${def.desc||('性能 '+(def.atk||def.def||def.speed))}<br>${def.type}`;const btn=document.createElement('button');btn.textContent=def.type==='use'?'使う':'装備する';btn.onclick=()=>{if(def.type==='use'){player.hp=Math.min(player.maxHp,player.hp+(it.key==='bigHerb'?30:12));AudioKit.sfx('heal');log(`${def.name}を使った。HPが回復した。`,'good')}else if(def.type==='life'){player.maxHp+=5;player.hp=Math.min(player.maxHp,player.hp+5);AudioKit.sfx('power');log(`${def.name}を使った。最大HPが${player.maxHp}になった。`,'good')}else if(def.type==='weapon'){player.weapon={key:it.key,name:def.name,atk:def.atk};log(`${def.name}を装備した。`,'good')}else if(def.type==='shield'){player.shield={key:it.key,name:def.name,def:def.def};log(`${def.name}を装備した。`,'good')}else if(def.type==='accessory'){player.accessory={key:it.key,name:def.name,atk:def.atk||0,speed:def.speed||0};log(`${def.name}を装備した。`,'good')}else if(def.type==='upgrade'){applyItemEffect(it.key,false)}player.inventory.splice(idx,1);renderMenu();renderHud()};card.appendChild(btn);menuGrid.appendChild(card)})}$('itemBtn').onclick=()=>{menu.style.display=menu.style.display==='block'?'none':'block';renderMenu()};menu.onclick=e=>{if(e.target===menu)menu.style.display='none'};
const otherPlayers=new Map();function makePlayerMesh(id){const root=new BABYLON.TransformNode('op_'+id,scene),body=BABYLON.MeshBuilder.CreateBox('body_'+id,{width:.65,height:1.25,depth:.35},scene);body.parent=root;body.position.y=.62;body.material=mat('bodyMat_'+id,.2+Math.random()*.6,.2+Math.random()*.6,.4+Math.random()*.5);const face=BABYLON.MeshBuilder.CreatePlane('face_'+id,{width:.75,height:.55},scene);face.parent=root;face.position.y=1.55;face.billboardMode=BABYLON.Mesh.BILLBOARDMODE_ALL;const tex=new BABYLON.DynamicTexture('faceTex_'+id,{width:128,height:96},scene,false),fm=new BABYLON.StandardMaterial('faceMat_'+id,scene);fm.diffuseTexture=tex;fm.emissiveColor=new BABYLON.Color3(1,1,1);face.material=fm;return{root,body,face,tex,lastFace:''}}function drawFace(op,imgData,name){const ctx=op.tex.getContext();ctx.fillStyle='#111';ctx.fillRect(0,0,128,96);if(imgData){const img=new Image();img.onload=()=>{ctx.drawImage(img,0,0,128,96);ctx.fillStyle='white';ctx.font='14px sans-serif';ctx.fillText(name||'P',5,90);op.tex.update()};img.src=imgData}else{ctx.fillStyle='white';ctx.font='18px sans-serif';ctx.fillText(name||'Player',12,52);op.tex.update()}}
function attachRoomSync(){onValue(ref(db,`rooms/${roomId}/blocks`),snap=>loadBlocks(snap.val()||{}));onValue(ref(db,`rooms/${roomId}/rogue`),snap=>{const data=snap.val();if(data&&!isHost)applyFloorData(data)});onValue(ref(db,`rooms/${roomId}/players`),snap=>{const players=snap.val()||{},seen=new Set(Object.keys(players));for(const[id,p]of Object.entries(players)){if(id===playerId)continue;if(!otherPlayers.has(id)){const op=makePlayerMesh(id);otherPlayers.set(id,op);drawFace(op,p.face,p.name)}const op=otherPlayers.get(id);op.root.position.set(p.x||0,(p.y||2)-1.75,p.z||0);op.root.rotation.y=p.yaw||0;if(op.lastFace!==p.face){op.lastFace=p.face;drawFace(op,p.face,p.name)}}for(const[id,op]of Array.from(otherPlayers.entries()))if(!seen.has(id)){op.root.dispose();otherPlayers.delete(id)}})}async function pushPlayerState(){if(!connected)return;await update(ref(db,`rooms/${roomId}/players/${playerId}`),{x:+player.x.toFixed(3),y:+player.y.toFixed(3),z:+player.z.toFixed(3),yaw:+player.yaw.toFixed(3),pitch:+player.pitch.toFixed(3),floor:player.floor,hp:player.hp,updatedAt:Date.now()})}async function startCamera(){try{const stream=await navigator.mediaDevices.getUserMedia({audio:false,video:{facingMode:'user',width:{ideal:160},height:{ideal:120}}});video.srcObject=stream}catch(e){setStatus((isHost?'HOST':'JOIN')+' Room: '+roomId+' / カメラ不可')}}async function pushFaceImage(){if(!connected||!video.videoWidth)return;const c=document.createElement('canvas');c.width=96;c.height=72;const ctx=c.getContext('2d');ctx.drawImage(video,0,0,c.width,c.height);await update(ref(db,`rooms/${roomId}/players/${playerId}`),{face:c.toDataURL('image/jpeg',.38)})}
async function startGame(host){AudioKit.unlock();playerName=(nameInput.value||'かずや').slice(0,16);roomId=safeRoom(roomInput.value)||randomRoom();roomInput.value=roomId;isHost=host;transitioningFloor=true;if(isHost){panelMsg.textContent='1階のローグライク世界を先読み生成中。生成完了後に開始します。';floorSeed=Date.now()%999999;prepareFloorData(1,true);await set(ref(db,'rooms/'+roomId),{meta:{host:playerId,createdAt:Date.now(),seed:floorSeed},players:{}})}else{const snap=await get(ref(db,'rooms/'+roomId));if(!snap.exists()){panelMsg.textContent='そのRoom IDは存在しません。先にHOSTで作成してください。';transitioningFloor=false;return}floorSeed=(snap.val().meta&&snap.val().meta.seed)||floorSeed}await set(ref(db,`rooms/${roomId}/players/${playerId}`),{id:playerId,name:playerName,x:player.x,y:player.y,z:player.z,yaw:player.yaw,pitch:player.pitch,face:'',updatedAt:Date.now()});onDisconnect(ref(db,`rooms/${roomId}/players/${playerId}`)).remove();attachRoomSync();connected=true;setStatus((isHost?'HOST':'JOIN')+' Room: '+roomId);startCamera();setInterval(pushPlayerState,110);setInterval(pushFaceImage,2200);if(isHost)await publishFloor(1);panel.style.display='none';transitioningFloor=false}$('hostBtn').onclick=()=>startGame(true);$('joinBtn').onclick=()=>startGame(false);
const marker=BABYLON.MeshBuilder.CreateBox('marker',{size:1.04},scene),markerMat=mat('markerMat',1,1,1,.25);marker.material=markerMat;marker.isVisible=false;
let lastPickAt=0,lastPickHit=null;engine.runRenderLoop(()=>{const now=performance.now();if(!gameCleared){updatePlayer();tickEnemies();pickupTick();portalTick();renderHud()}const hue=(now/900)%1;const col=BABYLON.Color3.FromHSV(hue*360,1,1);portalMat.emissiveColor=col;portalMat.diffuseColor=col;if(portal){portal.rotation.y+=.045;portal.rotation.x+=.02;portal.position.y=portal.metadata.baseY+Math.sin(now/300)*.22;for(let i=0;i<portalRings.length;i++){const ch=portalRings[i];if(ch&&ch.metadata){ch.rotation.x+=ch.metadata.spin;ch.rotation.y+=ch.metadata.spin*.7;ch.rotation.z+=ch.metadata.spin*.45}}if(portalLight){portalLight.diffuse=col;portalLight.intensity=.72+Math.sin(now/220)*.12}if(portalBeacon){portalBeacon.material.emissiveColor=col;portalBeacon.scaling.x=.70+Math.sin(now/300)*.018;portalBeacon.scaling.z=portalBeacon.scaling.x}}for(const m of itemMeshes.values()){m.rotation.y+=.024;if(m.metadata&&m.metadata.label)m.metadata.label.position.y=.78+Math.sin(now/320+m.position.x)*.045}if(slash){slash.rotation.z-=.28;slash.scaling.scaleInPlace(.965);slash.metadata.life--;if(slash.metadata.life<=0){slash.dispose();slash=null}}if(slash2){slash2.position.z+=.08;slash2.rotation.y+=.18;slash2.metadata.life--;if(slash2.metadata.life<=0){slash2.dispose();slash2=null}}for(let i=damageTexts.length-1;i>=0;i--){const d=damageTexts[i];d.life--;d.mesh.position.y+=d.vy||0;d.mesh.position.x+=d.vx||0;d.mesh.position.z+=d.vz||0;if(d.spark)d.mesh.scaling.scaleInPlace(.94);else d.mesh.scaling.scaleInPlace(1.01);if(d.life<=0){d.mesh.dispose();damageTexts.splice(i,1)}}if(now-lastPickAt>66){lastPickAt=now;lastPickHit=pickBlock()}if(lastPickHit){marker.isVisible=true;marker.position.copyFrom(lastPickHit.pickedMesh.position)}else marker.isVisible=false;scene.render()});window.addEventListener('resize',()=>{engine.setHardwareScalingLevel(1);engine.resize()});
