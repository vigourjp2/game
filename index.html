    }else{
      if(db){
        const snap=await get(ref(db,'rooms/'+roomId));
        if(!snap.exists()){panelMsg.textContent='そのRoom IDは存在しません。HOSTで開始します。';isHost=true;floorSeed=Date.now()%999999;prepareFloorData(1,true);}
        else floorSeed=(snap.val().meta&&snap.val().meta.seed)||floorSeed;
      }else{
        isHost=true;floorSeed=Date.now()%999999;prepareFloorData(1,true);
      }
    }
    if(db){
      await set(ref(db,`rooms/${roomId}/players/${playerId}`),{id:playerId,name:playerName,x:player.x,y:player.y,z:player.z,yaw:player.yaw,pitch:player.pitch,face:'',updatedAt:Date.now()});
      onDisconnect(ref(db,`rooms/${roomId}/players/${playerId}`)).remove();
      attachRoomSync();
      connected=true;
      setInterval(pushPlayerState,110);
      setInterval(pushFaceImage,2200);
    }
    setStatus((isHost?'HOST':'JOIN')+' Room: '+roomId);
    startCamera();
    if(isHost)await publishFloor(1);
    panel.style.display='none';
    transitioningFloor=false;
  }catch(err){
    console.error(err);
    panelMsg.textContent='通信開始に失敗。LOCALで開始します。';
    floorSeed=Date.now()%999999;
    isHost=true;
    prepareFloorData(1,true);
    publishFloor(1).catch(()=>applyFloorData(nextFloorData||generateFloorData(1,floorSeed)));
    enterLocalGame('HOST Room: '+roomId);
  }
}
function bindStartButton(id,host){
  const el=$(id);
  if(!el)return;
  const fire=e=>{
    if(e){e.preventDefault();e.stopPropagation();}
    if(el.dataset.busy==='1')return;
    el.dataset.busy='1';
    panelMsg.textContent=(host?'HOST':'JOIN')+'起動処理中。';
    Promise.resolve(startGame(host)).catch(err=>{
      console.error(err);
      panelMsg.textContent='通常起動に失敗。LOCALで強制開始します。';
      floorSeed=Date.now()%999999;isHost=true;roomId=safeRoom(roomInput.value)||randomRoom();roomInput.value=roomId;
      const data=generateFloorData(1,floorSeed);applyFloorData(data);enterLocalGame('HOST Room: '+roomId);
    }).finally(()=>{el.dataset.busy='0'});
  };
  el.onclick=fire;
  el.ontouchstart=fire;
  el.onpointerdown=fire;
  el.addEventListener('click',fire,{capture:true});
  el.addEventListener('touchstart',fire,{passive:false,capture:true});
  el.addEventListener('touchend',fire,{passive:false,capture:true});
  el.addEventListener('pointerdown',fire,{capture:true});
}
bindStartButton('hostBtn',true);bindStartButton('joinBtn',false);
const marker=BABYLON.MeshBuilder.CreateBox('marker',{size:1.04},scene),markerMat=mat('markerMat',1,1,1,.25);marker.material=markerMat;marker.isVisible=false;
let lastPickAt=0,lastPickHit=null;
engine.runRenderLoop(()=>{
  const now=performance.now();
  let frameDt=Math.min(.05,(now-lastFrameTime)/1000);lastFrameTime=now;simAccumulator+=frameDt;
  let steps=0;
  while(simAccumulator>=FRAME_STEP&&steps<MAX_STEPS){
    if(!gameCleared){updatePlayer(1);tickProjectiles();pickupTick();portalTick()}
    simAccumulator-=FRAME_STEP;steps++;
  }
  if(steps===MAX_STEPS)simAccumulator=0;
  if(!gameCleared){tickEnemies();renderHud();updatePerfCulling(now)}
  updateRenderCamera();
  const hue=(now/900)%1;const col=BABYLON.Color3.FromHSV(hue*360,1,1);portalMat.emissiveColor=col;portalMat.diffuseColor=col;
  if(portal){portal.rotation.y+=.045;portal.rotation.x+=.02;portal.position.y=portal.metadata.baseY+Math.sin(now/300)*.22;for(let i=0;i<portalRings.length;i++){const ch=portalRings[i];if(ch&&ch.metadata){ch.rotation.x+=ch.metadata.spin;ch.rotation.y+=ch.metadata.spin*.7;ch.rotation.z+=ch.metadata.spin*.45}}if(portalLight){portalLight.diffuse=col;portalLight.intensity=.72+Math.sin(now/220)*.12}if(portalBeacon){portalBeacon.material.emissiveColor=col;portalBeacon.scaling.x=.70+Math.sin(now/300)*.018;portalBeacon.scaling.z=portalBeacon.scaling.x}}
  for(const m of itemMeshes.values()){if(!m.isEnabled())continue;m.rotation.y+=.024;if(m.metadata&&m.metadata.label&&m.metadata.label.isEnabled())m.metadata.label.position.y=.78+Math.sin(now/320+m.position.x)*.045}
  if(slash){slash.rotation.z-=.28;slash.scaling.scaleInPlace(.965);slash.metadata.life--;if(slash.metadata.life<=0){slash.dispose();slash=null}}
  if(slash2){slash2.position.z+=.08;slash2.rotation.y+=.18;slash2.metadata.life--;if(slash2.metadata.life<=0){slash2.dispose();slash2=null}}
  for(let i=damageTexts.length-1;i>=0;i--){const d=damageTexts[i];d.life--;d.mesh.position.y+=d.vy||0;d.mesh.position.x+=d.vx||0;d.mesh.position.z+=d.vz||0;if(d.spark)d.mesh.scaling.scaleInPlace(.94);else d.mesh.scaling.scaleInPlace(1.01);if(d.life<=0){d.mesh.dispose();damageTexts.splice(i,1)}}
  if(now-lastPickAt>50){lastPickAt=now;lastPickHit=pickBlock()}
  if(lastPickHit){marker.isVisible=true;marker.position.copyFrom(lastPickHit.pickedMesh.position)}else marker.isVisible=false;
  scene.render();
});
