<body>
<div id="wrap">
<header><h1>NEBULA ROGUE GRADIUS</h1><div id="sub">ランダム生成 横スクSTG<br>Firebase優先 / PeerJS保険</div></header>

<div id="panel"><div class="card"><h2>ROGUE SIDE-SCROLLER</h2><p>ステージはRoom IDから毎回生成。敵編隊・地形・アイテム・ボスがランダムに変化する協力シューティング。</p><input id="nameInput" value="PILOT" maxlength="16" placeholder="NAME"><input id="roomInput" value="ROOM1" maxlength="24" placeholder="ROOM ID"><div class="row"><button id="hostBtn" type="button">HOSTで開始</button><button id="joinBtn" type="button">JOINで開始</button></div><button id="soloBtn" type="button">ソロで開始</button><div id="status">待機中</div><p class="mini warn">Firebase設定がこのHTMLに入っている場合はFirebase同期。未設定ならPeerJS同期で協力プレイします。</p></div></div>

<script>
(function(){
"use strict";
const FIREBASE_CONFIG={apiKey:"",authDomain:"",databaseURL:"",projectId:"",storageBucket:"",messagingSenderId:"",appId:""};
const canvas=document.getElementById("game"),ctx=canvas.getContext("2d"),panel=document.getElementById("panel"),badge=document.getElementById("modeBadge"),hud=document.getElementById("hudBadge"),statusEl=document.getElementById("status"),toast=document.getElementById("toast"),result=document.getElementById("result"),resultTitle=document.getElementById("resultTitle"),resultText=document.getElementById("resultText"),nameInput=document.getElementById("nameInput"),roomInput=document.getElementById("roomInput");
let W=360,H=540,last=performance.now(),running=false,ended=false,mode="menu",side="p1",room="ROOM1",seed=1,scroll=0,shake=0,netKind="none",lastNet=0,peer=null,conn=null,db=null,roomRef=null,stateRef=null,remoteCache=null,uid=Math.random().toString(36).slice(2,9);
const keys=new Set(),remoteKeys=new Set(),stars=[],shots=[],enemyShots=[],enemies=[],items=[],booms=[],particles=[],terrain=[],events=[];
const playerBase={x:80,y:240,vx:0,vy:0,hp:100,maxHp:100,lives:3,power:1,speed:0,score:0,cool:0,bomb:2,bombHold:0,bombReady:true,inv:2,dead:false,name:"PILOT",color:"#49e7ff"};
let P1=clone(playerBase),P2=clone({...playerBase,x:80,y:300,color:"#ff5bea",name:"ALLY"});
function clone(o){return JSON.parse(JSON.stringify(o))}function rnd(n){seed=(seed*1664525+1013904223)>>>0;return seed%n}function hash(s){let h=2166136261>>>0;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)}return h>>>0}function safeRoom(v){return String(v||"ROOM1").replace(/[^a-zA-Z0-9_-]/g,"").slice(0,24)||"ROOM1"}function setStatus(t){statusEl.textContent=t}function show(t){toast.textContent=t;toast.style.opacity=1;clearTimeout(show.t);show.t=setTimeout(()=>toast.style.opacity=0,650)}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function dist(a,b){const dx=a.x-b.x,dy=a.y-b.y;return Math.hypot(dx,dy)}
let audioCtx=null,gain=null,bgm=null,bgmStep=0;function audio(){if(audioCtx)return;const AC=window.AudioContext||window.webkitAudioContext;if(!AC)return;audioCtx=new AC();gain=audioCtx.createGain();gain.gain.value=.22;gain.connect(audioCtx.destination)}function tone(f,d,type="square",vol=.12,slide=0){if(!audioCtx)return;const n=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type;o.frequency.setValueAtTime(f,n);if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(20,f+slide),n+d);g.gain.setValueAtTime(0,n);g.gain.linearRampToValueAtTime(vol,n+.01);g.gain.exponentialRampToValueAtTime(.001,n+d);o.connect(g);g.connect(gain);o.start(n);o.stop(n+d+.03)}function noise(d=.18,v=.12){if(!audioCtx)return;const len=Math.floor(audioCtx.sampleRate*d),buf=audioCtx.createBuffer(1,len,audioCtx.sampleRate),data=buf.getChannelData(0);for(let i=0;i<len;i++)data[i]=(Math.random()*2-1)*(1-i/len);const s=audioCtx.createBufferSource(),g=audioCtx.createGain();s.buffer=buf;g.gain.value=v;s.connect(g);g.connect(gain);s.start()}function sfx(k){audio();if(!audioCtx)return;if(audioCtx.state==="suspended")audioCtx.resume();if(k==="shot")tone(720,.055,"square",.055,180);if(k==="hit"){tone(110,.12,"sawtooth",.11,-50);noise(.08,.08)}if(k==="item")tone(880,.11,"triangle",.11,240);if(k==="bomb"){tone(70,.42,"sawtooth",.18,-30);noise(.36,.24)}if(k==="win")[440,660,990,1320].forEach((f,i)=>setTimeout(()=>tone(f,.16,"triangle",.13,90),i*95));if(k==="lose")[220,160,100].forEach((f,i)=>setTimeout(()=>tone(f,.18,"sawtooth",.12,-25),i*120));if(k==="click")tone(520,.045,"square",.05,80)}function startBgm(){audio();if(bgm)return;const bass=[82,98,110,98,123,147,110,98],lead=[330,392,440,392,494,587,494,392];bgm=setInterval(()=>{if(!running)return;let i=bgmStep++%8;tone(bass[i],.14,"triangle",.035);if(i%2===0)tone(lead[i],.1,"sine",.025)},190)}function stopBgm(){clearInterval(bgm);bgm=null}
function resize(){const dpr=Math.max(1,Math.min(devicePixelRatio||1,2)),r=canvas.getBoundingClientRect();W=Math.max(320,r.width||innerWidth);H=Math.max(420,r.height||innerHeight*.78);canvas.width=W*dpr;canvas.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);if(!stars.length)for(let i=0;i<110;i++)stars.push({x:Math.random()*W,y:Math.random()*H,z:.25+Math.random()*1.8})}
function generate(){terrain.length=0;events.length=0;let yTop=70+rnd(70),yBot=H-80-rnd(70),step=170;for(let i=0;i<240;i++){yTop=clamp(yTop+(rnd(61)-30),28,H*.42);yBot=clamp(yBot+(rnd(61)-30),H*.58,H-28);if(yBot-yTop<170)yBot=yTop+170;terrain.push({x:i*step,top:yTop,bot:yBot});if(i>4&&i<220){const r=rnd(100);if(r<48)events.push({x:i*step+rnd(90),type:"wave",kind:rnd(4)});else if(r<68)events.push({x:i*step+rnd(90),type:"turret"});else if(r<80)events.push({x:i*step+rnd(90),type:"item"});else if(r<86)events.push({x:i*step+rnd(90),type:"asteroid"})}}events.push({x:terrain[terrain.length-7].x,type:"boss",done:false})}
function terrainAt(wx){let i=Math.floor(wx/170);i=clamp(i,0,terrain.length-2);const a=terrain[i],b=terrain[i+1],t=(wx-a.x)/(b.x-a.x);return{top:a.top+(b.top-a.top)*t,bot:a.bot+(b.bot-a.bot)*t}}function resetGame(){ended=false;running=true;result.style.display="none";scroll=0;shots.length=0;enemyShots.length=0;enemies.length=0;items.length=0;booms.length=0;particles.length=0;P1=clone(playerBase);P2=clone({...playerBase,x:80,y:300,color:"#ff5bea",name:"ALLY"});P1.name=(nameInput.value||"HOST").slice(0,16);P2.name=mode==="solo"?"CPU":((side==="p2"?(nameInput.value||"JOIN"):"JOIN").slice(0,16));if(mode==="join"){P1.name="HOST";P2.name=(nameInput.value||"JOIN").slice(0,16)}seed=hash(room+"-nebula");generate();show("STAGE GENERATED");startBgm()}
function damage(p,n){if(p.inv>0||p.dead)return;p.hp-=n;p.inv=.75;shake=Math.max(shake,8);sfx("hit");if(p.hp<=0){p.lives--;p.hp=p.maxHp;p.power=Math.max(1,p.power-1);p.bomb=Math.max(0,p.bomb-1);p.x=70;p.y=H/2;p.inv=2;if(p.lives<0){p.dead=true;p.hp=0;show(`${p.name} DOWN`);if(P1.dead&&P2.dead)finish("lose")}}}function finish(kind,fromNet){if(ended)return;ended=true;running=false;stopBgm();const win=kind!=="lose";resultTitle.textContent=win?"CLEAR":"GAME OVER";resultText.textContent=win?`協力撃破完了 / TEAM SCORE ${Math.max(P1.score,P2.score)}`:`全機撃墜 / TEAM SCORE ${Math.max(P1.score,P2.score)}`;result.style.display="flex";show(win?"MISSION CLEAR":"TEAM DOWN");sfx(win?"win":"lose");if(!fromNet)sendNet({type:"finish",result:kind})}
function fire(p){if(p.cool>0||p.dead)return;const count=Math.max(1,Math.floor(p.power));p.cool=Math.max(.035,.22-count*.012);for(let i=0;i<count;i++){const offset=i-(count-1)/2;shots.push({owner:p===P1?"p1":"p2",x:p.x+24,y:p.y+offset*7,vx:560+34*count,vy:offset*28,life:1.8,pow:8+count*2,color:p.color})}sfx("shot")}function bomb(p){if(p.bomb<=0||p.dead)return;p.bomb--;shake=18;booms.push({x:p.x,y:p.y,r:20,life:.55,max:.55,color:p.color});for(const e of enemies)e.hp-=90;enemyShots.length=0;sfx("bomb");show("BOMB")}
function spawnEvent(ev){ev.done=true;const x=ev.x-scroll+W+50;if(ev.type==="wave"){for(let i=0;i<4+rnd(3);i++){let y=90+rnd(Math.max(80,Math.floor(H-180)));enemies.push({x:x+i*38,y,type:ev.kind,hp:18+ev.kind*5,t:0,score:100+ev.kind*30})}}else if(ev.type==="turret"){const yy=rnd(2)?terrainAt(ev.x).top+22:terrainAt(ev.x).bot-22;enemies.push({x,y:yy,type:4,hp:34,t:0,score:180})}else if(ev.type==="asteroid"){for(let i=0;i<3;i++)enemies.push({x:x+i*70,y:70+rnd(Math.max(80,Math.floor(H-140))),type:5,hp:42,t:0,score:150})}else if(ev.type==="item"){items.push({x,y:90+rnd(Math.max(80,Math.floor(H-180))),kind:rnd(4),t:0})}else if(ev.type==="boss"){enemies.push({x:W+130,y:H/2,type:9,hp:520,t:0,score:3000,boss:true})}}
function updatePlayer(p,input,dt,ai){if(p.dead)return;const spd=1+(p.speed||0)*.16;if(ai){p.y+=Math.sin(performance.now()/420)*55*spd*dt;if(Math.random()<.018)fire(p);if(Math.random()<.002)bomb(p);p.x=clamp(p.x+(Math.random()-.52)*90*spd*dt,45,W*.35)}else{let ax=(input.has("ArrowRight")-input.has("ArrowLeft"))*720*spd,ay=(input.has("ArrowDown")-input.has("ArrowUp"))*720*spd;p.vx=(p.vx+ax*dt)*.82;p.vy=(p.vy+ay*dt)*.82;p.x=clamp(p.x+p.vx*dt,28,W-32);p.y=clamp(p.y+p.vy*dt,28,H-28);if(input.has("Space"))fire(p);if(input.has("KeyX")){p.bombHold=(p.bombHold||0)+dt;if(p.bombReady&&p.bombHold>=.45){p.bombReady=false;bomb(p)}}else{p.bombHold=0;p.bombReady=true}}p.cool=Math.max(0,p.cool-dt);p.inv=Math.max(0,p.inv-dt);const t=terrainAt(scroll+p.x);if(p.y<t.top+18||p.y>t.bot-18)damage(p,18)}
function updateWorld(dt){scroll+=120*dt;for(const ev of events)if(!ev.done&&ev.x<scroll+W+120)spawnEvent(ev);const hostWorld=mode!=="join";if(hostWorld){for(const e of enemies){e.t+=dt;if(e.boss){e.x+=((W-120)-e.x)*dt*.35;e.y=H/2+Math.sin(e.t*2.1)*H*.25;if(e.t%0.78<dt)for(let a=-1;a<=1;a++)enemyShots.push({x:e.x-34,y:e.y,vx:-230,vy:a*62,life:2.6})}else{e.x-= (90+(e.type%4)*22)*dt;e.y+=Math.sin(e.t*3+e.type)*50*dt;if(e.t%2.45<dt)enemyShots.push({x:e.x-16,y:e.y,vx:-220,vy:(Math.random()-.5)*80,life:2.2})}}}
for(const s of shots){s.x+=s.vx*dt;s.y+=s.vy*dt;s.life-=dt}for(const s of enemyShots){s.x+=s.vx*dt;s.y+=s.vy*dt;s.life-=dt}for(const it of items){it.x-=120*dt;it.t+=dt;it.y+=Math.sin(it.t*4)*18*dt}for(const b of booms){b.life-=dt;b.r+=520*dt}for(const p of particles){p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt}
for(let i=shots.length-1;i>=0;i--){const s=shots[i];if(s.life<=0||s.x>W+80||s.y<-50||s.y>H+50){shots.splice(i,1);continue}let blocked=false;for(const es of enemyShots){if(es.life>0&&Math.abs(s.x-es.x)<20&&Math.abs(s.y-es.y)<16){es.life=0;s.life=0;blocked=true;particles.push({x:(s.x+es.x)/2,y:(s.y+es.y)/2,vx:-40,vy:0,life:.22,color:s.color});break}}if(blocked)continue;for(const e of enemies){if(Math.abs(s.x-e.x)<28&&(Math.abs(s.y-e.y)<(e.boss?58:24))){e.hp-=s.pow;s.life=0;particles.push({x:s.x,y:s.y,vx:-70,vy:0,life:.25,color:s.color});break}}}
for(let i=enemies.length-1;i>=0;i--){const e=enemies[i];if(e.hp<=0){P1.score+=e.score;P2.score=P1.score;if(Math.random()<.18&&!e.boss)items.push({x:e.x,y:e.y,kind:rnd(4),t:0});explode(e.x,e.y,e.boss?36:14,e.boss?"#ff4ee9":"#ffda4d");enemies.splice(i,1);if(e.boss)finish("win");continue}if(e.x<-80)enemies.splice(i,1)}
for(const p of [P1,P2]){for(const e of enemies)if(dist(p,e)<(e.boss?70:28))damage(p,e.boss?30:18);for(const s of enemyShots)if(dist(p,s)<18){s.life=0;damage(p,12)}for(const it of items)if(dist(p,it)<28){if(it.kind===0)p.power+=1;if(it.kind===1)p.hp=clamp(p.hp+25,0,p.maxHp);if(it.kind===2)p.bomb+=1;if(it.kind===3)p.speed=(p.speed||0)+1;it.dead=true;sfx("item");show(it.kind===0?`POWER UP x${p.power}`:it.kind===1?"REPAIR":it.kind===2?`BOMB +1 (${p.bomb})`:`SPEED UP x${p.speed}`)}}for(let i=items.length-1;i>=0;i--)if(items[i].dead||items[i].x<-50)items.splice(i,1);for(let i=enemyShots.length-1;i>=0;i--)if(enemyShots[i].life<=0||enemyShots[i].x<-80)enemyShots.splice(i,1);for(let i=particles.length-1;i>=0;i--)if(particles[i].life<=0)particles.splice(i,1);for(let i=booms.length-1;i>=0;i--)if(booms[i].life<=0)booms.splice(i,1)}
function explode(x,y,n,c){shake=Math.max(shake,7);for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*360,vy:(Math.random()-.5)*360,life:.35+Math.random()*.35,color:c});sfx("hit")}
function pack(){return{scroll,P1,P2,shots,enemyShots,enemies,items,booms,particles,eventsDone:events.map(e=>!!e.done),ended}}function apply(s){if(!s)return;scroll=s.scroll||scroll;P1=s.P1||P1;P2=s.P2||P2;shots.splice(0,shots.length,...(s.shots||[]));enemyShots.splice(0,enemyShots.length,...(s.enemyShots||[]));enemies.splice(0,enemies.length,...(s.enemies||[]));items.splice(0,items.length,...(s.items||[]));booms.splice(0,booms.length,...(s.booms||[]));particles.splice(0,particles.length,...(s.particles||[]));if(s.eventsDone)for(let i=0;i<s.eventsDone.length&&i<events.length;i++)events[i].done=s.eventsDone[i];if(s.ended&&!ended)ended=true}
function fbReady(){return FIREBASE_CONFIG.apiKey&&FIREBASE_CONFIG.databaseURL&&window.firebase}function initFirebase(){if(!fbReady())return false;try{if(!firebase.apps.length)firebase.initializeApp(FIREBASE_CONFIG);db=firebase.database();roomRef=db.ref("nebulaRogueRooms/"+room);stateRef=roomRef.child("state");roomRef.child("players/"+side).set({uid,name:nameInput.value||side,ts:firebase.database.ServerValue.TIMESTAMP});roomRef.child("players/"+side).onDisconnect().remove();stateRef.on("value",snap=>{if(mode==="join")apply(snap.val())});netKind="Firebase";return true}catch(e){setStatus("Firebase起動失敗。PeerJSへ切替: "+(e.message||e));return false}}
function peerId(){return "nebula-rogue-"+room}function setupPeer(c){conn=c;conn.on("open",()=>{netKind="PeerJS";setStatus("PeerJS接続完了");sendNet({type:"hello"})});conn.on("data",d=>{if(d.type==="state"&&side==="p2")apply(d.state);if(d.type==="input"&&side==="p1"){remoteKeys.clear();for(const k of d.keys||[])remoteKeys.add(k)}if(d.type==="hello")sendNet({type:"state",state:pack()});if(d.type==="finish")finish(d.result||"lose",true)});conn.on("close",()=>setStatus("PeerJS切断"))}function initPeerHost(){if(!window.Peer)return;try{if(peer)peer.destroy();peer=new Peer(peerId(),{debug:0});peer.on("open",()=>setStatus("HOST待機中\nPeerJS Room: "+room));peer.on("connection",setupPeer);peer.on("error",e=>setStatus("PeerJS HOSTエラー: "+(e.message||e)))}catch(e){setStatus("PeerJS起動エラー: "+(e.message||e))}}function initPeerJoin(){if(!window.Peer)return;try{if(peer)peer.destroy();peer=new Peer(undefined,{debug:0});peer.on("open",()=>{setupPeer(peer.connect(peerId(),{reliable:true}));setStatus("HOSTへ接続中")});peer.on("error",e=>setStatus("PeerJS JOINエラー: "+(e.message||e)))}catch(e){setStatus("PeerJS起動エラー: "+(e.message||e))}}
function sendNet(msg){if(netKind==="PeerJS"&&conn&&conn.open)conn.send(msg);if(netKind==="Firebase"&&stateRef&&side==="p1"&&msg.type==="state")stateRef.set(msg.state)}
function start(m){sfx("click");mode=m;side=m==="join"?"p2":"p1";room=safeRoom(roomInput.value);panel.style.display="none";badge.textContent=(m==="solo"?"SOLO CO-OP":"CO-OP ROOM "+room+" / "+side.toUpperCase());resetGame();if(m==="solo"){netKind="none";setStatus("SOLO開始");return}if(initFirebase()){setStatus("Firebase協力プレイ同期開始\n"+(side==="p1"?"HOSTは世界を生成・送信":"JOINはHOST状態を受信"));return}if(m==="host")initPeerHost();else initPeerJoin()}
function drawShip(p){ctx.save();ctx.globalAlpha=p.inv>0?.45+.35*Math.sin(performance.now()/45):1;ctx.translate(p.x,p.y);ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=18;ctx.beginPath();ctx.moveTo(25,0);ctx.lineTo(-18,-13);ctx.lineTo(-8,0);ctx.lineTo(-18,13);ctx.closePath();ctx.fill();ctx.fillStyle="#fff";ctx.fillRect(-2,-3,10,6);ctx.restore()}function drawBar(p,x,y){ctx.fillStyle="rgba(255,255,255,.16)";ctx.fillRect(x,y,130,8);ctx.fillStyle=p.color;ctx.fillRect(x,y,130*clamp(p.hp/p.maxHp,0,1),8);ctx.fillStyle="#fff";ctx.font="900 12px system-ui";ctx.textAlign="left";ctx.fillText(`${p.name} HP ${Math.ceil(p.hp)}  P${p.power}  S${p.speed||0}  B${p.bomb}  L${Math.max(0,p.lives)}`,x,y-5)}
function draw(){const sx=shake>0?(Math.random()-.5)*shake:0,sy=shake>0?(Math.random()-.5)*shake:0;shake*=.86;ctx.clearRect(0,0,W,H);ctx.save();ctx.translate(sx,sy);for(const st of stars){st.x-=st.z*(running?1.8:.4);if(st.x<0){st.x=W;st.y=Math.random()*H}ctx.globalAlpha=.25+st.z*.25;ctx.fillStyle="#c9f6ff";ctx.fillRect(st.x,st.y,Math.max(1,st.z),Math.max(1,st.z))}ctx.globalAlpha=1;ctx.fillStyle="#061225";ctx.beginPath();ctx.moveTo(0,0);for(let x=0;x<=W;x+=28){const t=terrainAt(scroll+x);ctx.lineTo(x,t.top)}ctx.lineTo(W,0);ctx.closePath();ctx.fill();ctx.beginPath();ctx.moveTo(0,H);for(let x=0;x<=W;x+=28){const t=terrainAt(scroll+x);ctx.lineTo(x,t.bot)}ctx.lineTo(W,H);ctx.closePath();ctx.fill();ctx.strokeStyle="rgba(73,231,255,.28)";ctx.lineWidth=2;ctx.beginPath();for(let x=0;x<=W;x+=28){const t=terrainAt(scroll+x);if(x===0)ctx.moveTo(x,t.top);else ctx.lineTo(x,t.top)}ctx.stroke();ctx.beginPath();for(let x=0;x<=W;x+=28){const t=terrainAt(scroll+x);if(x===0)ctx.moveTo(x,t.bot);else ctx.lineTo(x,t.bot)}ctx.stroke();for(const it of items){ctx.fillStyle=it.kind===0?"#72ff73":it.kind===1?"#61d8ff":it.kind===2?"#ffdc4e":"#ff8cff";ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=18;ctx.beginPath();ctx.arc(it.x,it.y,13+Math.sin(it.t*8)*2,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0}for(const s of shots){ctx.strokeStyle=s.color;ctx.shadowColor=s.color;ctx.shadowBlur=14;ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(s.x-18,s.y);ctx.lineTo(s.x+13,s.y);ctx.stroke();ctx.shadowBlur=0}for(const s of enemyShots){ctx.fillStyle="#ff6b4a";ctx.shadowColor="#ff6b4a";ctx.shadowBlur=12;ctx.beginPath();ctx.arc(s.x,s.y,5,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0}for(const e of enemies){ctx.save();ctx.translate(e.x,e.y);ctx.fillStyle=e.boss?"#8c35ff":(e.type===4?"#ffbc35":"#ff386c");ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=16;ctx.beginPath();if(e.boss){ctx.ellipse(0,0,64,46,0,0,Math.PI*2);ctx.fill();ctx.fillStyle="#fff";ctx.fillRect(-35,-5,18,10);ctx.fillRect(18,-5,18,10)}else{ctx.moveTo(-22,0);ctx.lineTo(18,-15);ctx.lineTo(12,0);ctx.lineTo(18,15);ctx.closePath();ctx.fill()}ctx.restore()}for(const b of booms){ctx.globalAlpha=clamp(b.life/b.max,0,1);ctx.strokeStyle=b.color;ctx.lineWidth=5;ctx.shadowColor=b.color;ctx.shadowBlur=26;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;ctx.shadowBlur=0}for(const p of particles){ctx.globalAlpha=clamp(p.life/.5,0,1);ctx.fillStyle=p.color;ctx.fillRect(p.x,p.y,4,4);ctx.globalAlpha=1}drawShip(P1);drawShip(P2);ctx.restore();drawBar(P1,12,34);drawBar(P2,W-142,34);ctx.textAlign="center";ctx.fillStyle="rgba(255,255,255,.86)";ctx.font="900 13px system-ui";ctx.fillText("←→↑↓ 移動 / SHOT / BOMB長押し  自ビームで敵弾相殺",W/2,H-14);hud.textContent=`${netKind.toUpperCase()}  TEAM SCORE ${Math.max(P1.score,P2.score)}`}
function loop(now){const dt=Math.min(.05,(now-last)/1000);last=now;if(running&&!ended){if(mode==="join"&&netKind!=="none"){updatePlayer(P2,keys,dt,false);if(netKind==="PeerJS")sendNet({type:"input",keys:[...keys]})}else{updatePlayer(P1,keys,dt,false);updatePlayer(P2,mode==="solo"?remoteKeys:remoteKeys,dt,mode==="solo");updateWorld(dt);if(mode!=="solo"&&now-lastNet>80){lastNet=now;sendNet({type:"state",state:pack()})}}}draw();requestAnimationFrame(loop)}
let down=false,sx0=0,sy0=0,lastTap=0,longT=null;function tap(k){keys.add(k);setTimeout(()=>keys.delete(k),70)}canvas.addEventListener("pointerdown",e=>{audio();startBgm();down=true;sx0=e.clientX;sy0=e.clientY;clearTimeout(longT);longT=setTimeout(()=>keys.add("KeyX"),520)});canvas.addEventListener("pointermove",e=>{if(!down)return;const dx=e.clientX-sx0,dy=e.clientY-sy0,th=24;if(Math.abs(dx)>th||Math.abs(dy)>th){clearTimeout(longT);keys.delete("ArrowLeft");keys.delete("ArrowRight");keys.delete("ArrowUp");keys.delete("ArrowDown");if(dx>th)keys.add("ArrowRight");if(dx<-th)keys.add("ArrowLeft");if(dy>th)keys.add("ArrowDown");if(dy<-th)keys.add("ArrowUp")}});canvas.addEventListener("pointerup",e=>{down=false;clearTimeout(longT);["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"].forEach(k=>keys.delete(k));keys.delete("KeyX");const n=performance.now();if(n-lastTap<280){keys.add("KeyX");setTimeout(()=>keys.delete("KeyX"),520);lastTap=0}else{tap("Space");lastTap=n}});
for(const b of document.querySelectorAll("#controls button")){const k=b.dataset.k;b.addEventListener("pointerdown",e=>{e.preventDefault();keys.add(k);audio();startBgm()});b.addEventListener("pointerup",e=>{e.preventDefault();keys.delete(k)});b.addEventListener("pointercancel",()=>keys.delete(k));b.addEventListener("pointerleave",()=>keys.delete(k))}window.addEventListener("keydown",e=>{if(["ArrowLeft","ArrowRight","ArrowUp","ArrowDown","Space","KeyX"].includes(e.code)){e.preventDefault();keys.add(e.code);audio();startBgm()}});window.addEventListener("keyup",e=>keys.delete(e.code));window.addEventListener("resize",resize);
function bind(id,fn){const el=document.getElementById(id);const run=e=>{if(e){e.preventDefault();e.stopPropagation()}fn()};el.onclick=run;el.onpointerup=run;el.ontouchend=run}bind("hostBtn",()=>start("host"));bind("joinBtn",()=>start("join"));bind("soloBtn",()=>start("solo"));bind("againBtn",()=>start(mode==="menu"?"solo":mode));resize();seed=hash("menu");generate();requestAnimationFrame(loop);
})();
