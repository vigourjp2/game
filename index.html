function enemyPowerColor(e){return e.boss?mats.boss:mats.enemy}function spawnEnemies(list){clearMeshes(enemyMeshes);for(const e of list){const m=BABYLON.MeshBuilder.CreateBox('enemy_'+e.id,{width:.8,height:.9,depth:.8},scene);m.position.set(e.x,e.y+.45,e.z);m.material=enemyPowerColor(e);m.metadata={kind:'enemy',...e};enemyMeshes.set(e.id,m)}}function spawnItems(list){clearMeshes(itemMeshes);for(const it of list){const m=BABYLON.MeshBuilder.CreateBox('item_'+it.id,{size:.45},scene);m.position.set(it.x,it.y+.25,it.z);m.material=it.key==='gold'?mats.gold:mats[itemMaster[it.key]?.type]||mats.potion;m.metadata={kind:'item',...it};itemMeshes.set(it.id,m)}}
async function publishFloor(floor){const data=generateFloorData(floor,Date.now()%1000000000);await set(ref(db,`rooms/${roomId}/rogue`),data);await set(ref(db,`rooms/${roomId}/blocks`),data.blocks);applyFloorData(data)}
document.getElementById('hostBtn').onclick=()=>startGame(true);document.getElementById('joinBtn').onclick=()=>startGame(false);
async function startGame(host){playerName=(nameInput.value||'Player').slice(0,16);roomId=safeRoom(roomInput.value)||randomRoom();roomInput.value=roomId;isHost=host;const roomRef=ref(db,'rooms/'+roomId);if(isHost){const data=generateFloorData(1,Date.now()%1000000000);await set(roomRef,{meta:{host:playerId,createdAt:Date.now(),updatedAt:Date.now()},blocks:data.blocks,rogue:data,players:{}});applyFloorData(data)}else{const snap=await get(roomRef);if(!snap.exists()){panelMsg.textContent='そのRoom IDは存在しません。先にHOSTで作成してください。';return}}await set(ref(db,`rooms/${roomId}/players/${playerId}`),{id:playerId,name:playerName,x:player.x,y:player.y,z:player.z,yaw:player.yaw,pitch:player.pitch,face:'',updatedAt:Date.now()});onDisconnect(ref(db,`rooms/${roomId}/players/${playerId}`)).remove();attachRoomSync();panel.style.display='none';connected=true;roomReady=true;setStatus((isHost?'HOST':'JOIN')+' Room: '+roomId);startCamera();setInterval(pushPlayerState,100);setInterval(pushFaceImage,2200);if(isHost)setInterval(()=>update(ref(db,`rooms/${roomId}/meta`),{updatedAt:Date.now()}),2000);log('冒険開始。BREAKは敵に当てると攻撃、ブロックに当てると採掘。','good')}
function setupStick(stickId,knobId,target){const stick=document.getElementById(stickId),knob=document.getElementById(knobId);let activeId=null;const max=50;function setKnob(dx,dy){const len=Math.hypot(dx,dy);if(len>max){dx=dx/len*max;dy=dy/len*max}knob.style.left=50+dx+'px';knob.style.top=50+dy+'px';target.x=dx/max;target.y=dy/max}function reset(){activeId=null;knob.style.left='50px';knob.style.top='50px';target.x=0;target.y=0}stick.addEventListener('touchstart',e=>{e.preventDefault();if(activeId!==null)return;const t=e.changedTouches[0];activeId=t.identifier;const r=stick.getBoundingClientRect();setKnob(t.clientX-(r.left+75),t.clientY-(r.top+75))},{passive:false});stick.addEventListener('touchmove',e=>{e.preventDefault();if(activeId===null)return;const r=stick.getBoundingClientRect();for(const t of e.changedTouches)if(t.identifier===activeId)setKnob(t.clientX-(r.left+75),t.clientY-(r.top+75))},{passive:false});stick.addEventListener('touchend',e=>{e.preventDefault();for(const t of e.changedTouches)if(t.identifier===activeId)reset()},{passive:false});stick.addEventListener('touchcancel',reset)}setupStick('moveStick','moveKnob',moveVec);setupStick('lookStick','lookKnob',lookVec);
function pickTarget(){const ray=new BABYLON.Ray(camera.position,camera.getForwardRay(6).direction,6);return scene.pickWithRay(ray,mesh=>mesh.metadata&&(mesh.metadata.kind==='enemy'||mesh.metadata.kind==='block'))}function pickBlock(){const hit=pickTarget();return hit&&hit.hit&&hit.pickedMesh.metadata.kind==='block'?hit:null}function normalDir(hit){const n=hit.getNormal(true);return new BABYLON.Vector3(Math.round(n.x),Math.round(n.y),Math.round(n.z))}async function syncBlockSet(x,y,z,type){addBlockLocal(x,y,z,type);if(connected)await set(ref(db,`rooms/${roomId}/blocks/${k(x,y,z)}`),type)}async function syncBlockRemove(x,y,z){removeBlockLocal(x,y,z);if(connected)await remove(ref(db,`rooms/${roomId}/blocks/${k(x,y,z)}`))}
function playerAttackEnemy(mesh){const e=mesh.metadata;const bonus=(player.weapon?.atk||0)+(player.accessory?.atk||0);const dmg=Math.max(1,player.atk+bonus+Math.floor(Math.random()*4)-e.def);e.hp-=dmg;log(`${playerName||'プレイヤー'}は${e.name}を攻撃した。${e.name}に${dmg}のダメージ。`,'good');if(e.hp<=0){log(`${e.name}を倒した。${e.gold}Gを手に入れた。`,'gold');player.gold+=e.gold;maybeDrop(e);mesh.dispose();enemyMeshes.delete(e.id);if(e.boss){log('最ボスが崩れ落ちた。最後の階段が開いた。','good')} }else{log(`${e.name}の残りHP ${e.hp}`,'bad')}}
function maybeDrop(e){if(Math.random()<.35){const key=player.floor>60?'bigHerb':'herb';player.inventory.push({key,name:itemMaster[key].name});log(`${e.name}は${itemMaster[key].name}を落とした。`,'gold')}}
function breakOrAttack(){const hit=pickTarget();if(!hit||!hit.hit)return;const md=hit.pickedMesh.metadata;if(md.kind==='enemy'){playerAttackEnemy(hit.pickedMesh);return}const m=md;syncBlockRemove(m.x,m.y,m.z);log(`${m.type}ブロックを壊した。素材を手に入れた気がする。`,'info')}
document.getElementById('breakBtn').addEventListener('touchstart',e=>{e.preventDefault();breakOrAttack()},{passive:false});document.getElementById('breakBtn').addEventListener('mousedown',e=>{e.preventDefault();breakOrAttack()});document.getElementById('placeBtn').addEventListener('touchstart',e=>{e.preventDefault();placeBlock()},{passive:false});document.getElementById('placeBtn').addEventListener('mousedown',e=>{e.preventDefault();placeBlock()});
function placeBlock(){const hit=pickBlock();if(!hit)return;const m=hit.pickedMesh.metadata,n=normalDir(hit),nx=m.x+n.x,ny=m.y+n.y,nz=m.z+n.z,px=Math.round(player.x),pz=Math.round(player.z);if(nx===px&&nz===pz&&ny>=Math.floor(player.y-1.7)&&ny<=Math.floor(player.y))return;syncBlockSet(nx,ny,nz,'dirt');log('土ブロックを置いた。マイクラ式の足場作りだ。','info')}
function isGrounded(){return Math.abs(player.y-groundHeightAt(player.x,player.z))<.06&&player.vy===0}function doJump(){if(isGrounded())player.vy=.24}const jumpBtn=document.getElementById('jumpBtn');jumpBtn.addEventListener('touchstart',e=>{e.preventDefault();doJump()},{passive:false});jumpBtn.addEventListener('mousedown',e=>{e.preventDefault();doJump()});
function playerBlocked(nx,ny,nz){const feetY=Math.floor(ny-player.height+.15),headY=Math.floor(ny-.15),minX=Math.floor(nx-player.radius),maxX=Math.floor(nx+player.radius),minZ=Math.floor(nz-player.radius),maxZ=Math.floor(nz+player.radius);for(let x=minX;x<=maxX;x++)for(let y=feetY;y<=headY;y++)for(let z=minZ;z<=maxZ;z++)if(existsBlock(x,y,z))return true;return false}function groundHeightAt(px,pz){let best=-999;const minX=Math.floor(px-player.radius),maxX=Math.floor(px+player.radius),minZ=Math.floor(pz-player.radius),maxZ=Math.floor(pz+player.radius);for(let x=minX;x<=maxX;x++)for(let z=minZ;z<=maxZ;z++){const ty=topYAt(x,z);if(ty>best)best=ty}return best+1+player.height}function tryStepMove(nx,nz){if(!playerBlocked(nx,player.y,nz)){player.x=nx;player.z=nz;return}if(player.vy!==0)return;const curGround=groundHeightAt(player.x,player.z),nextGround=groundHeightAt(nx,nz),step=nextGround-curGround;if(step>.03&&step<=1.58&&!playerBlocked(nx,nextGround,nz)){player.x=nx;player.z=nz;player.y=nextGround;player.vy=0}}
function updatePlayer(){player.yaw+=lookVec.x*.045;player.pitch+=lookVec.y*.03;player.pitch=Math.max(-1.1,Math.min(1,player.pitch));const speed=.13+(player.accessory?.speed||0),forward=new BABYLON.Vector3(Math.sin(player.yaw),0,Math.cos(player.yaw)),right=new BABYLON.Vector3(Math.cos(player.yaw),0,-Math.sin(player.yaw)),dx=(right.x*moveVec.x+forward.x*-moveVec.y)*speed,dz=(right.z*moveVec.x+forward.z*-moveVec.y)*speed;tryStepMove(player.x+dx,player.z);tryStepMove(player.x,player.z+dz);player.vy-=.018;let ny=player.y+player.vy;if(player.vy<=0){const groundY=groundHeightAt(player.x,player.z);if(ny<=groundY){ny=groundY;player.vy=0}}if(!playerBlocked(player.x,ny,player.z))player.y=ny;else player.vy=0;camera.position.set(player.x,player.y-.1,player.z);camera.rotation.x=player.pitch;camera.rotation.y=player.yaw}
function tickEnemies(){const now=Date.now();if(now-lastEnemyTick<650)return;lastEnemyTick=now;for(const [id,m]of Array.from(enemyMeshes.entries())){const e=m.metadata,dx=player.x-e.x,dz=player.z-e.z,dist=Math.hypot(dx,dz);if(dist<1.35){const def=(player.shield?.def||0)+player.def,damage=Math.max(1,e.atk+Math.floor(Math.random()*3)-def);player.hp-=damage;log(`${e.name}の攻撃。${playerName||'プレイヤー'}は${damage}のダメージを受けた。`,'bad');if(player.hp<=0){player.hp=player.maxHp;player.gold=Math.floor(player.gold/2);player.x=0;player.z=0;player.y=groundHeightAt(0,0);log('倒れた。所持金が半分になり、階の入口へ戻された。','bad')}}else if(dist<9){e.x+=dx/dist*.25;e.z+=dz/dist*.25;m.position.x=e.x;m.position.z=e.z}}}
function pickupTick(){const now=Date.now();if(now-lastPickup<250)return;lastPickup=now;for(const [id,m]of Array.from(itemMeshes.entries())){const it=m.metadata;if(Math.hypot(player.x-it.x,player.z-it.z)<1.0){if(it.key==='gold'){player.gold+=(it.gold||0);log(`${it.gold||0}Gを拾った。`,'gold')}else if(it.shop){const def=itemMaster[it.key];if(player.gold>=def.price){player.gold-=def.price;player.inventory.push({key:it.key,name:def.name});log(`お店で${def.name}を${def.price}Gで買った。`,'gold')}else{log(`${it.name}は${def.price}G。お金が足りない。`,'bad');continue}}else{player.inventory.push({key:it.key,name:itemMaster[it.key].name});log(`${itemMaster[it.key].name}を拾った。ITEMから装備または使用できる。`,'gold')}m.dispose();itemMeshes.delete(id)}}}
async function stairTick(){const now=Date.now();if(now-lastStair<1200||!roomReady)return;lastStair=now;const stair=[...blocks.values()].find(b=>b.metadata.type==='stairs');if(!stair)return;const s=stair.metadata;if(Math.hypot(player.x-s.x,player.z-s.z)<1.15){if(player.floor>=99&&enemyMeshes.has('boss')){log('階段は封印されている。最ボスを倒せ。','bad');return}if(player.floor>=99){gameCleared=true;document.getElementById('ending').style.display='flex';return}log(`${player.floor}階の階段を登った。次のランダム世界へ進む。`,'good');if(isHost)await publishFloor(player.floor+1);else log('JOIN側はHOSTが階段更新するのを待っている。','bad')}}
function renderHud(){hud.innerHTML=`<b>${player.floor}F</b> / HP ${player.hp}/${player.maxHp}<br>攻撃 ${player.atk+(player.weapon?.atk||0)+(player.accessory?.atk||0)} / 防御 ${player.def+(player.shield?.def||0)}<br>所持金 ${player.gold}G<br>武器 ${player.weapon?.name||'なし'}<br>盾 ${player.shield?.name||'なし'}<br>アクセ ${player.accessory?.name||'なし'}<br>敵 ${enemyMeshes.size}体 / アイテム ${itemMeshes.size}個`}
function renderMenu(){menuInfo.innerHTML=`HP ${player.hp}/${player.maxHp} / ${player.gold}G / ${player.floor}F<br>装備: ${player.weapon?.name||'武器なし'} / ${player.shield?.name||'盾なし'} / ${player.accessory?.name||'アクセなし'}`;menuGrid.innerHTML='';if(player.inventory.length===0){menuGrid.innerHTML='<div class="itemCard">アイテムなし。ダンジョンで拾え。</div>';return}player.inventory.forEach((it,idx)=>{const def=itemMaster[it.key],card=document.createElement('div');card.className='itemCard';card.innerHTML=`<b>${def.name}</b><br>${def.desc||((def.atk?'攻撃+'+def.atk:'')||(def.def?'防御+'+def.def:'装備品'))}<br><span class="shopTag">${def.type}</span>`;const btn=document.createElement('button');btn.textContent=def.type==='use'?'使う':'装備する';btn.onclick=()=>{if(def.type==='use'){player.hp=Math.min(player.maxHp,player.hp+(it.key==='bigHerb'?30:12));log(`${def.name}を使った。HPが回復した。`,'good')}else if(def.type==='weapon'){player.weapon={key:it.key,name:def.name,atk:def.atk};log(`${def.name}を装備した。`,'good')}else if(def.type==='shield'){player.shield={key:it.key,name:def.name,def:def.def};log(`${def.name}を装備した。`,'good')}else if(def.type==='accessory'){player.accessory={key:it.key,name:def.name,atk:def.atk||0,speed:def.speed||0};log(`${def.name}を装備した。`,'good')}player.inventory.splice(idx,1);renderMenu();renderHud()};card.appendChild(btn);menuGrid.appendChild(card)})}
document.getElementById('itemBtn').onclick=()=>{menu.style.display=menu.style.display==='block'?'none':'block';renderMenu()};menu.onclick=e=>{if(e.target===menu)menu.style.display='none'};
const otherPlayers=new Map();function makePlayerMesh(id){const root=new BABYLON.TransformNode('op_'+id,scene),body=BABYLON.MeshBuilder.CreateBox('body_'+id,{width:.65,height:1.25,depth:.35},scene);body.parent=root;body.position.y=.62;body.material=makeMat('bodyMat_'+id,0.1+Math.random()*.8,0.2+Math.random()*.7,0.4+Math.random()*.5);const face=BABYLON.MeshBuilder.CreatePlane('face_'+id,{width:.75,height:.55},scene);face.parent=root;face.position.y=1.55;face.billboardMode=BABYLON.Mesh.BILLBOARDMODE_ALL;const tex=new BABYLON.DynamicTexture('faceTex_'+id,{width:128,height:96},scene,false),fm=new BABYLON.StandardMaterial('faceMat_'+id,scene);fm.diffuseTexture=tex;fm.emissiveColor=new BABYLON.Color3(1,1,1);face.material=fm;return{root,body,face,tex,lastFace:''}}function drawFace(op,imgData,name){const ctx=op.tex.getContext();ctx.fillStyle='#111';ctx.fillRect(0,0,128,96);if(imgData){const img=new Image();img.onload=()=>{ctx.drawImage(img,0,0,128,96);ctx.fillStyle='white';ctx.font='14px sans-serif';ctx.fillText(name||'P',5,90);op.tex.update()};img.src=imgData}else{ctx.fillStyle='white';ctx.font='18px sans-serif';ctx.fillText(name||'Player',12,52);op.tex.update()}}
function attachRoomSync(){onValue(ref(db,`rooms/${roomId}/blocks`),snap=>loadBlocks(snap.val()||{}));onValue(ref(db,`rooms/${roomId}/rogue`),snap=>{const data=snap.val();if(data&&!isHost)applyFloorData(data)});onValue(ref(db,`rooms/${roomId}/players`),snap=>{const players=snap.val()||{},seen=new Set(Object.keys(players));for(const[id,p]of Object.entries(players)){if(id===playerId)continue;if(!otherPlayers.has(id)){const op=makePlayerMesh(id);otherPlayers.set(id,op);drawFace(op,p.face,p.name)}const op=otherPlayers.get(id);op.root.position.set(p.x||0,(p.y||2)-1.75,p.z||0);op.root.rotation.y=p.yaw||0;if(op.lastFace!==p.face){op.lastFace=p.face;drawFace(op,p.face,p.name)}}for(const[id,op]of Array.from(otherPlayers.entries()))if(!seen.has(id)){op.root.dispose();otherPlayers.delete(id)}})}async function pushPlayerState(){if(!connected)return;await update(ref(db,`rooms/${roomId}/players/${playerId}`),{x:+player.x.toFixed(3),y:+player.y.toFixed(3),z:+player.z.toFixed(3),yaw:+player.yaw.toFixed(3),pitch:+player.pitch.toFixed(3),floor:player.floor,hp:player.hp,updatedAt:Date.now()})}async function startCamera(){try{const stream=await navigator.mediaDevices.getUserMedia({audio:false,video:{facingMode:'user',width:{ideal:160},height:{ideal:120}}});video.srcObject=stream}catch(e){setStatus((isHost?'HOST':'JOIN')+' Room: '+roomId+' / カメラ不可')}}async function pushFaceImage(){if(!connected||!video.videoWidth)return;const c=document.createElement('canvas');c.width=96;c.height=72;const ctx=c.getContext('2d');ctx.drawImage(video,0,0,c.width,c.height);const data=c.toDataURL('image/jpeg',.38);await update(ref(db,`rooms/${roomId}/players/${playerId}`),{face:data})}
const marker=BABYLON.MeshBuilder.CreateBox('marker',{size:1.04},scene),markerMat=makeMat('markerMat',1,1,1,.25);marker.material=markerMat;marker.isVisible=false;
engine.runRenderLoop(()=>{if(!gameCleared){updatePlayer();tickEnemies();pickupTick();stairTick();renderHud()}const hit=pickTarget();if(hit&&hit.hit&&hit.pickedMesh.metadata.kind==='block'){marker.isVisible=true;marker.position.copyFrom(hit.pickedMesh.position)}else marker.isVisible=false;for(const m of itemMeshes.values())m.rotation.y+=.03;scene.render()});window.addEventListener('resize',()=>engine.resize());
</script>
